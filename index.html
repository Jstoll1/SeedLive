<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Calcutta 2026</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:#08080f;
  color:#e2e2ef;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
  height:100%;
  overflow:hidden;
}

/* ── LAYOUT ─────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:430px;margin:0 auto;position:relative}

/* ── HEADER ─────────────────────────────────────────── */
.hdr{
  padding:env(safe-area-inset-top,12px) 16px 10px;
  padding-top:max(env(safe-area-inset-top),16px);
  background:#08080f;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  border-bottom:1px solid #13131e;
}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:-.4px;color:#fff}
.hdr-sub{font-size:11px;color:#3a3a55;margin-top:1px;letter-spacing:.3px}
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:#160d0d;border:1px solid rgba(224,82,82,.4);
  border-radius:20px;padding:4px 10px;
  font-size:10px;font-weight:700;letter-spacing:1.5px;color:#e05252;
  text-transform:uppercase;white-space:nowrap;
}
.live-dot{width:5px;height:5px;border-radius:50%;background:#e05252;animation:pulse 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes amber-pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SCROLL AREA ─────────────────────────────────────── */
.scroll-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:12px 12px 0;
}

/* ── BOTTOM NAV ──────────────────────────────────────── */
.bottom-nav{
  display:flex;flex-shrink:0;
  background:#0c0c16;
  border-top:1px solid #13131e;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:10px 4px 8px;
  border:none;background:transparent;
  color:#3a3a55;font-size:10px;font-weight:500;
  cursor:pointer;transition:color .15s;
  min-height:54px;
}
.nav-btn.on{color:#e2e2ef}
.nav-btn.on .nav-icon{color:#f59e0b}
.nav-icon{font-size:20px;line-height:1;transition:color .15s}
.nav-label{font-size:10px;letter-spacing:.3px}

/* ── PANELS ──────────────────────────────────────────── */
.panel{display:none}
.panel.on{display:block}

/* ── SECTION LABEL ───────────────────────────────────── */
.sec-label{
  font-size:10px;font-weight:600;letter-spacing:2.5px;
  color:#3a3a55;text-transform:uppercase;
  margin:16px 0 8px;
}
.sec-label:first-child{margin-top:0}

/* ══════════════════════════════════════════════════════
   TEAMS TAB — grouped by owner
══════════════════════════════════════════════════════ */
.owner-list{display:flex;flex-direction:column;gap:10px;padding-bottom:16px}

.ocard{
  background:#111119;border-radius:14px;
  overflow:hidden;border:1px solid #1a1a27;
  position:relative;
}
.ocard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--oc)}
.ocard.has-live{border-color:rgba(245,158,11,.3)}

/* owner header — 2-row layout */
.ocard-hdr{display:flex;flex-direction:column;gap:3px;padding:13px 14px 10px;}
.ocard-row1{display:flex;align-items:center;justify-content:space-between;}
.ocard-row2{display:flex;align-items:baseline;justify-content:space-between;}
.ocard-name{font-size:17px;font-weight:800;color:var(--oc);line-height:1;letter-spacing:-.3px}
.ocard-alive-pill{font-size:9px;font-weight:700;color:#22c55e;background:rgba(34,197,94,.12);border-radius:20px;padding:2px 7px;margin-left:7px;letter-spacing:.3px}
.ocard-stats{font-size:11px;color:#3a3a55;line-height:1.7}
.ocard-stats b{color:#5a5a7a}
.ocard-net{font-size:20px;font-weight:800;line-height:1;color:#3a3a55}
.ocard-net.pos{color:#22c55e}
.ocard-netlabel{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}

/* team chips grid — 3 per row */
.ocard-teams{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:#16161f;
  border-top:1px solid #16161f;
}
.tchip{
  background:#111119;
  display:flex;align-items:center;gap:8px;
  padding:9px 10px;
  position:relative;
}
.tchip.live{background:#130f07}
.tchip.earned{background:#0c130c}
.tchip.lost{background:#0e0e14;opacity:.4}
.tchip.lost.sp-winner{opacity:1}

/* live pulse bar — left edge */
.tchip.live::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:#f59e0b;animation:pulse 1.2s ease-in-out infinite;
}
.tchip.earned::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:#22c55e;
}

.tchip-logo{width:30px;height:30px;border-radius:7px;object-fit:contain;background:#1a1a28;flex-shrink:0}
.tchip-logo-fb{width:30px;height:30px;border-radius:7px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#34344a;flex-shrink:0}
.tchip-info{flex:1;min-width:0}
.tchip-seed{font-size:8px;font-weight:700;color:#3a3a55;letter-spacing:.3px;line-height:1}
.tchip-name{font-size:10px;font-weight:600;color:#9090aa;line-height:1.25;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tchip.live  .tchip-name{color:#f59e0b}
.tchip.live  .tchip-seed{color:#7a5500}
.tchip.earned .tchip-name{color:#4ade80}
.tchip.lost  .tchip-name{text-decoration:line-through;color:#2c2c3e}

/* earn tag on chip */
.tchip-earn{font-size:7px;font-weight:800;color:#4ade80;letter-spacing:.2px;margin-top:2px}
.tchip-loss-badge{display:inline-flex;align-items:center;gap:2px;font-size:7px;font-weight:800;color:#ef4444;background:#1a0808;border-radius:3px;padding:1px 4px;margin-top:2px;letter-spacing:.2px}
.tchip-upset-badge{display:inline-flex;align-items:center;gap:2px;font-size:7px;font-weight:800;color:#f59e0b;background:#1a1000;border-radius:3px;padding:1px 4px;margin-top:2px;letter-spacing:.2px}
.tchip-seed15-badge{display:inline-flex;align-items:center;gap:2px;font-size:7px;font-weight:800;color:#a78bfa;background:#0e0a1a;border-radius:3px;padding:1px 4px;margin-top:2px;letter-spacing:.2px}
.tchip-live-dot{width:5px;height:5px;border-radius:50%;background:#f59e0b;animation:pulse 1s ease-in-out infinite;flex-shrink:0;margin-left:auto}
/* owner card loss badge — shown in standings */
.ocard-loss-badge{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:800;color:#ef4444;background:#1a0808;border:1px solid rgba(239,68,68,.2);border-radius:4px;padding:2px 6px;margin-top:5px}

/* ══════════════════════════════════════════════════════
   GAMES TAB — full-width matchup cards
══════════════════════════════════════════════════════ */
.games-section{margin-bottom:20px}
.games-sec-hdr{
  font-size:10px;font-weight:700;letter-spacing:2.5px;
  color:#3a3a55;text-transform:uppercase;
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.games-sec-hdr .live-dot{width:6px;height:6px;background:#ef4444}
.game-list{display:flex;flex-direction:column;gap:8px}

/* ── MATCHUP CARD ────────────────────────────────────── */
.mcard{background:#111119;border-radius:12px;overflow:hidden;border:1px solid #1a1a27}
.mcard.live{border-color:rgba(239,68,68,.4);background:#0f0808}
.mcard.final{border-color:#16161f;opacity:.85}

/* top bar: round label + time/status */
.mcard-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 11px 5px;border-bottom:1px solid #15151e;
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  color:#3a3a55;text-transform:uppercase;
}
.mcard.live .mcard-top{color:#ef4444;background:#180808}
.mcard-top-right{font-size:9px;font-weight:600;color:#3a3a55;letter-spacing:.5px}
.mcard.live .mcard-top-right{color:#ef4444}

/* body: symmetric 3-col grid — left team | center | right team */
.mcard-body{display:grid;grid-template-columns:1fr 58px 1fr;align-items:center;min-height:58px}

/* team side — left aligns left, right aligns right */
.mcard-side{display:flex;align-items:center;gap:7px;padding:9px 6px 9px 11px}
.mcard-side.right{flex-direction:row-reverse;padding:9px 11px 9px 6px}

/* logo */
.mcard-logo{width:30px;height:30px;border-radius:7px;object-fit:contain;background:#1a1a28;flex-shrink:0}
.mcard-logo-fb{width:30px;height:30px;border-radius:7px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#34344a;flex-shrink:0}
.mcard.live .mcard-logo,.mcard.live .mcard-logo-fb{box-shadow:0 0 0 1.5px rgba(239,68,68,.4)}

/* text info block */
.mcard-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.mcard-side.right .mcard-info{align-items:flex-end}
.mcard-tname{font-size:12px;font-weight:600;color:#cccce0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.mcard-tname.winner{color:#22c55e}
.mcard-tname.loser{color:#252535;text-decoration:line-through}
.mcard-meta{display:flex;align-items:center;gap:4px;flex-wrap:nowrap}
.mcard-side.right .mcard-meta{flex-direction:row-reverse}
.mcard-seed{font-size:9px;font-weight:700;color:#3a3a55}
/* inline earn badge */
.mcard-earn{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;white-space:nowrap;margin-top:1px}
.mcard-earn.r1 {background:#0d1a07;color:#4ade80}
.mcard-earn.s16{background:#0d0d20;color:#818cf8}
/* upset eligibility banner — sits between top bar and body */
.upset-banner{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:4px 11px;font-size:8px;font-weight:800;letter-spacing:.8px;
  text-transform:uppercase;border-bottom:1px solid transparent;
}
.upset-banner.beats{
  background:rgba(245,158,11,.12);color:#f59e0b;
  border-bottom-color:rgba(245,158,11,.2);
}
.upset-banner.ties{
  background:rgba(245,158,11,.06);color:#b97f20;
  border-bottom-color:rgba(245,158,11,.1);
}

/* center col: score or VS + status label */
.mcard-mid{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;padding:6px 0;
  border-left:1px solid #15151e;border-right:1px solid #15151e;
  height:100%;
}
.mcard-scores{display:flex;align-items:center;gap:3px}
.mcard-sc{font-size:17px;font-weight:800;line-height:1;color:#4a4a66}
.mcard-sc.win{color:#22c55e}
.mcard-sc.lose{color:#222230}
.mcard-sc-sep{font-size:11px;font-weight:600;color:#252530}
.mcard-vs{font-size:11px;font-weight:800;color:#252530;letter-spacing:.5px}
.mcard-status{font-size:8px;font-weight:700;color:#3a3a55;letter-spacing:.8px;text-transform:uppercase}
.mcard-status.live{color:#ef4444;animation:pulse 1.4s ease-in-out infinite}

/* ══════════════════════════════════════════════════════
   STANDINGS TAB
══════════════════════════════════════════════════════ */
.stand-list{display:flex;flex-direction:column;gap:8px;padding-bottom:16px}
.stand-card{
  background:#111119;border-radius:14px;
  padding:14px 14px 12px;
  position:relative;overflow:hidden;
  border:1px solid #1a1a27;
}
.stand-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--oc)}
.stand-rank{position:absolute;top:12px;right:13px;font-size:11px;color:#252535;font-weight:800}
.stand-net{font-size:28px;font-weight:800;line-height:1;color:#4a4a66}
.stand-net.pos{color:#22c55e}
.stand-name{font-size:14px;font-weight:700;color:var(--oc);margin-top:3px}
.stand-stats{font-size:11px;color:#3a3a55;margin-top:7px;line-height:1.7}
.stand-stats b{color:#6a6a88}
.stand-teams{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;padding-top:9px;border-top:1px solid #17172a}
.stand-team-chip{
  display:flex;align-items:center;gap:4px;
  background:#161625;border-radius:6px;padding:3px 6px 3px 4px;
}
.stand-chip-logo{width:18px;height:18px;border-radius:4px;object-fit:contain;background:#1a1a28;flex-shrink:0}
.stand-chip-logo-fb{width:18px;height:18px;border-radius:4px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#34344a;flex-shrink:0}
.stand-chip-name{font-size:9px;color:#5a5a7a;font-weight:500}
.stand-chip-name.earn{color:#4ade80}
.stand-chip-live{width:5px;height:5px;border-radius:50%;background:#f59e0b;animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}

/* ══════════════════════════════════════════════════════
   PAYOUTS TAB
══════════════════════════════════════════════════════ */
.pay-list{display:flex;flex-direction:column;gap:8px;padding-bottom:16px}
.pcard{background:#111119;border-radius:14px;padding:14px;border:1px solid #1a1a27}
.pcard-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.pcard-name{font-size:13px;font-weight:700;color:#c0c0dc}
.pcard-pct{font-size:10px;color:#3a3a55;margin-top:2px}
.pcard-amt{font-size:16px;font-weight:800;color:#f59e0b;white-space:nowrap}
.pcard-note{font-size:10px;color:#4a4a66;margin-top:7px;line-height:1.65}
.pcard-rule{font-size:10px;color:#555570;margin-top:6px;line-height:1.6;background:#14141e;border-radius:7px;padding:8px 10px}
.pcard-sep{height:1px;background:#18182a;margin:9px 0}
.pcard-winners{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.pwinner{display:inline-flex;align-items:center;gap:6px;background:#18182a;border-radius:6px;padding:5px 9px 5px 5px}
.pw-logo{width:20px;height:20px;border-radius:5px;object-fit:contain;background:#1a1a28;flex-shrink:0}
.pw-logo-fb{width:20px;height:20px;border-radius:5px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#3a3a55;flex-shrink:0}
.pw-name{font-size:11px;color:#c0c0dc;font-weight:500}
.pw-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;color:#000}
.pw-amt{font-size:11px;font-weight:700;color:#22c55e;margin-left:2px}
.pcard-tbd{font-size:10px;color:#2a2a3a;font-style:italic;margin-top:7px}
.pcard-leader{font-size:10px;color:#5a5a7a;margin-top:6px;line-height:1.6;background:#13131e;border-radius:6px;padding:7px 10px}
.pcard-sec{font-size:10px;font-weight:600;letter-spacing:2px;color:#3a3a55;text-transform:uppercase;margin:18px 0 8px}

/* ── SIDE POT EXPANDABLE ─────────────────────────────── */
.pcard-details{margin-top:9px}
.pcard-details summary{font-size:8px;font-weight:700;color:#3a3a55;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;list-style:none;display:inline-flex;align-items:center;gap:5px;user-select:none}
.pcard-details summary::-webkit-details-marker{display:none}
.pcard-details summary::after{content:'▶ SEE LOGIC';font-size:7px}
.pcard-details[open] summary::after{content:'▼ HIDE'}
.pcard-detail-body{margin-top:9px;overflow-x:auto}
.pcard-tbl{width:100%;border-collapse:collapse;font-size:8.5px}
.pcard-tbl th{text-align:left;color:#3a3a55;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px 4px 0;border-bottom:1px solid #1a1a2a;white-space:nowrap}
.pcard-tbl td{padding:5px 8px 5px 0;color:#4a4a66;border-bottom:1px solid #111120;white-space:nowrap}
.pcard-tbl tr.sp-win td{color:#e0e0f0;font-weight:700}
.pcard-tbl .sp-margin{font-weight:800}
.pcard-tbl .sp-w{color:#22c55e}
.pcard-tbl .sp-l{color:#ef4444}
.pcard-tbl .sp-owner{display:inline-block;font-size:7px;font-weight:700;padding:1px 4px;border-radius:2px;color:#000;vertical-align:middle}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#252535;border-radius:3px}
</style>
</head>
<body>


<div id="app">

  <!-- HEADER -->
  <div class="hdr">
    <div>
      <div class="hdr-title">Calcutta 2026</div>
      <div class="hdr-sub">MARCH MADNESS · $27,160 POT</div>
    </div>
    <div class="live-badge" id="round-pill"><span class="live-dot"></span><span id="round-txt">R64 · Live</span></div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scroll-area">
    <!-- Games panel -->
    <div class="panel on" id="panel-games">
      <div id="games-content"></div>
    </div>

    <!-- Teams panel -->
    <div class="panel" id="panel-teams">
      <div class="sec-label" id="teams-label">All Owners</div>
      <div class="owner-list" id="owner-list"></div>
    </div>

    <!-- Standings panel -->
    <div class="panel" id="panel-standings">
      <div class="sec-label">Leaderboard</div>
      <div class="stand-list" id="stand-list"></div>
    </div>

    <!-- Payouts panel -->
    <div class="panel" id="panel-payouts">
      <div class="sec-label">Prize Breakdown · $27,160 Total</div>
      <div class="pay-list" id="pay-list"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn on" onclick="switchTab('games',this)">
      <span class="nav-icon">🏀</span>
      <span class="nav-label">Games</span>
    </button>
    <button class="nav-btn" onclick="switchTab('teams',this)">
      <span class="nav-icon">📋</span>
      <span class="nav-label">Teams</span>
    </button>
    <button class="nav-btn" onclick="switchTab('standings',this)">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">Standings</span>
    </button>
    <button class="nav-btn" onclick="switchTab('payouts',this)">
      <span class="nav-icon">💰</span>
      <span class="nav-label">Payouts</span>
    </button>
  </nav>
</div>

/* ─── SIDE POT COMPUTATION ────────────────────────────────────
   Single source of truth used by both renderPayouts() and ownerEarned().

   BIGGEST LOSS  (R64 only)
     Largest point-margin defeat. Tie → lowest points scored. Tie → split.

   BIGGEST UPSET (any round)
     Largest seed differential. Tie → higher seed number wins. Tie → split.

   BEST 15/16
     Furthest round reached. Tie (same round, both lost after R1) →
     smallest loss margin IN that round. Tie → split.
     If nobody won R1: smallest margin in R1. Tie → split.
─────────────────────────────────────────────────────────────── */
var _sidePotCache = null;
function computeSidePots() {
  if(_sidePotCache) return _sidePotCache;
  var roundOrder = {R64:1,R32:2,S16:3,E8:4,F4:5,NCG:6};
  var r64Games   = completedGames.filter(function(g){return g.round==='R64';});
  var r64Done    = r64Games.length >= 32;

  /* ── BIGGEST LOSS ──────────────────────────────────────── */
  var blossMargin=-1, blossMinPts=Infinity, blossEntries=[];
  r64Games.forEach(function(g){
    var w=g.t1.winner?g.t1:g.t2, l=g.t1.winner?g.t2:g.t1;
    if(!w||!l) return;
    var m=w.score-l.score, pts=l.score;
    if(m>blossMargin){
      blossMargin=m; blossMinPts=pts; blossEntries=[{loser:l,margin:m,pts:pts}];
    } else if(m===blossMargin){
      if(pts<blossMinPts){ blossMinPts=pts; blossEntries=[{loser:l,margin:m,pts:pts}]; }
      else if(pts===blossMinPts){ blossEntries.push({loser:l,margin:m,pts:pts}); } /* split */
    }
  });
  var lossWinners=[], lossTeams=[];
  blossEntries.forEach(function(e){ if(e.loser.matched){ lossWinners.push(e.loser.matched.owner); lossTeams.push(e.loser.matched.name); }});

  /* ── BIGGEST UPSET ─────────────────────────────────────── */
  var bupsetDiff=-1, bupsetTopSeed=-1, bupsetEntries=[], allUpsets=[];
  completedGames.forEach(function(g){
    var w=g.t1.winner?g.t1:g.t2, l=g.t1.winner?g.t2:g.t1;
    if(!w||!l||!w.matched||!l.matched) return;
    var diff=w.matched.seed-l.matched.seed;
    if(diff<=0) return;
    var wseed=w.matched.seed;
    allUpsets.push({winner:w,loser:l,diff:diff,round:g.round}); /* full leaderboard */
    if(diff>bupsetDiff){
      bupsetDiff=diff; bupsetTopSeed=wseed; bupsetEntries=[{winner:w,loser:l,diff:diff,round:g.round}];
    } else if(diff===bupsetDiff){
      if(wseed>bupsetTopSeed){ bupsetTopSeed=wseed; bupsetEntries=[{winner:w,loser:l,diff:diff,round:g.round}]; }
      else if(wseed===bupsetTopSeed){ bupsetEntries.push({winner:w,loser:l,diff:diff,round:g.round}); } /* split */
    }
  });
  allUpsets.sort(function(a,b){ return b.diff-a.diff||b.winner.matched.seed-a.winner.matched.seed; });
  var upsetWinners=[], upsetTeams=[];
  bupsetEntries.forEach(function(e){ if(e.winner.matched){ upsetWinners.push(e.winner.matched.owner); upsetTeams.push(e.winner.matched.name); }});

  /* ── BEST 15/16 ────────────────────────────────────────── */
  var alive1516  = TEAMS.filter(function(t){return (t.seed===15||t.seed===16)&&t.status!=='lost';});
  var all1516Done= alive1516.length===0;
  var seed15Winners=[], seed15Teams=[], seed15Data=null;
  if(all1516Done){
    /* Build loss record for every 15/16 team */
    var records=[];
    completedGames.forEach(function(g){
      var w=g.t1.winner?g.t1:g.t2, l=g.t1.winner?g.t2:g.t1;
      if(!l||!l.matched) return;
      if(l.matched.seed!==15&&l.matched.seed!==16) return;
      records.push({team:l.matched,round:g.round,roundNum:roundOrder[g.round]||0,margin:w.score-l.score});
    });
    if(records.length){
      var bestRound=Math.max.apply(null,records.map(function(r){return r.roundNum;}));
      var topRecords=records.filter(function(r){return r.roundNum===bestRound;});
      if(topRecords.length===1){
        seed15Data=topRecords[0]; seed15Winners=[topRecords[0].team.owner]; seed15Teams=[topRecords[0].team.name];
      } else {
        /* Same round — tiebreaker: smallest loss margin IN that specific round */
        var bestMargin=Math.min.apply(null,topRecords.map(function(r){return r.margin;}));
        var finalists=topRecords.filter(function(r){return r.margin===bestMargin;});
        seed15Data=finalists[0];
        finalists.forEach(function(r){ seed15Winners.push(r.team.owner); seed15Teams.push(r.team.name); });
      }
    }
  }

  /* ── CONFIRMED overrides: loss + seed15 are done — always enforce, ignore ESPN ── */
  if(SIDE_POT_MANUAL.lossTeam){
    var lt=TEAMS.find(function(t){return t.name===SIDE_POT_MANUAL.lossTeam;});
    if(lt){ lossTeams=[lt.name]; lossWinners=[lt.owner]; }
  }
  if(SIDE_POT_MANUAL.seed15Team){
    var st=TEAMS.find(function(t){return t.name===SIDE_POT_MANUAL.seed15Team;});
    if(st){ seed15Teams=[st.name]; seed15Winners=[st.owner]; }
  }
  /* ── Upset: moving target — manual is floor, ESPN wins if it finds a bigger upset ── */
  if(SIDE_POT_MANUAL.upsetTeam){
    var manDiff=SIDE_POT_MANUAL.upsetDiff||0;
    if(manDiff>=bupsetDiff){
      var ut=TEAMS.find(function(t){return t.name===SIDE_POT_MANUAL.upsetTeam;});
      if(ut){ upsetTeams=[ut.name]; upsetWinners=[ut.owner]; bupsetDiff=manDiff; }
    }
  }

  var sp = {
    /* winner arrays (length > 1 = split pot) */
    lossWinners:lossWinners,   lossTeams:lossTeams,   lossConfirmed:lossWinners.length>0,
    upsetWinners:upsetWinners, upsetTeams:upsetTeams,
    seed15Winners:seed15Winners, seed15Teams:seed15Teams, seed15Confirmed:seed15Winners.length>0,

    /* raw data for payouts display */
    blossEntries:blossEntries,  blossMargin:blossMargin,
    bupsetEntries:bupsetEntries, bupsetDiff:bupsetDiff, allUpsets:allUpsets,
    seed15Data:seed15Data,

    alive1516:alive1516, r64Done:r64Done, all1516Done:all1516Done
  };
  _sidePotCache=sp;
  return sp;
}
function clearSidePotCache(){ _sidePotCache=null; }

function ownerEarned(oid) {
  var total=0, r1pp=getR1PerTeam();
  TEAMS.forEach(function(t){ if(t.owner===oid && t.r1eligible && t.wonR1) total+=r1pp; });
  var sp=computeSidePots();
  if(sp.lossConfirmed   && sp.lossWinners.indexOf(oid)>-1)  total += POTS.loss/sp.lossWinners.length;
  if(sp.upsetWinners.length && sp.upsetWinners.indexOf(oid)>-1) total += POTS.upset/sp.upsetWinners.length;
  if(sp.seed15Confirmed && sp.seed15Winners.indexOf(oid)>-1) total += POTS.seed15/sp.seed15Winners.length;
  return total;
}

function ownerNet(oid) { return ownerEarned(oid)-OWNERS[oid].paid; }

function espnNameMatch(n) {
  n=(n||'').toLowerCase().trim();
  for(var i=0;i<TEAMS.length;i++){
    var t=TEAMS[i];
    for(var j=0;j<t.espn.length;j++){ if(n===t.espn[j]) return t; }
  }
  return null;
}

function toETDate(iso) {
  try {
    var d=new Date(iso);
    var s=d.toLocaleDateString('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit'});
    var p=s.split('/');
    return p[2]+'-'+p[0]+'-'+p[1];
  } catch(e){ return ''; }
}

function getGameRound(ev, teams) {
  var comp=ev.competitions&&ev.competitions[0];
  if(comp&&comp.notes&&comp.notes.length){
    var hl=(comp.notes[0].headline||'').toLowerCase();
    /* IMPORTANT: check specific rounds BEFORE generic "championship" keyword,
       because ESPN prepends "NCAA ... Championship -" to every round headline */
    if(hl.indexOf('first round')>-1||hl.indexOf('1st round')>-1||hl.indexOf('round of 64')>-1) return 'R64';
    if(hl.indexOf('second round')>-1||hl.indexOf('2nd round')>-1||hl.indexOf('round of 32')>-1){
      var d=toETDate(ev.date||''); if(d) knownR32Dates[d]=true; return 'R32';
    }
    if(hl.indexOf('sweet')>-1)  return 'S16';
    if(hl.indexOf('elite')>-1)  return 'E8';
    if(hl.indexOf('final four')>-1||hl.indexOf('semifinal')>-1) return 'F4';
    if(hl.indexOf('national championship')>-1||hl.indexOf('championship game')>-1) return 'NCG';
  }
  if(teams){
    var matched=teams.filter(function(t){return t.matched;});
    if(matched.length>=2&&matched.every(function(t){return t.matched.status==='won';})){
      var d2=toETDate(ev.date||''); if(d2) knownR32Dates[d2]=true; return 'R32';
    }
  }
  return 'R64';
}

function processESPN(data) {
  if(!data||!data.events) return;
  liveGames=[]; completedGames=[]; upcomingGames=[]; clearSidePotCache();

  data.events.forEach(function(ev){
    if(!ev.competitions||!ev.competitions[0]) return;
    var comp=ev.competitions[0];
    var comps=comp.competitors;
    if(!comps||comps.length<2) return;

    var state=comp.status&&comp.status.type?comp.status.type.state:'pre';
    var detail=comp.status&&comp.status.type?comp.status.type.shortDetail:'';

    var teams=comps.map(function(c){
      var nm=c.team?(c.team.shortDisplayName||c.team.displayName||''):'';
      var nmAlt=c.team?(c.team.displayName||''):'';
      var matched=espnNameMatch(nm)||espnNameMatch(nmAlt);
      var sc=parseInt(c.score||'0',10)||0;
      var winner=c.winner===true;
      var logoUrl='';
      if(c.team){
        if(c.team.id) logoUrl='https://a.espncdn.com/i/teamlogos/ncaa/500/'+c.team.id+'.png';
        else if(c.team.logo) logoUrl=c.team.logo;
      }
      return {espnName:nm,matched:matched,score:sc,winner:winner,logoUrl:logoUrl};
    });

    var gameRound=getGameRound(ev,teams);

    /* Update team status from ESPN */
    teams.forEach(function(t){
      if(!t.matched) return;
      if(state==='in'){
        t.matched.status='live';
      } else if(state==='post'){
        if(t.winner){
          if(gameRound==='R64'&&t.matched.r1eligible) t.matched.wonR1=true;
          t.matched.status='won';
        } else {
          t.matched.status='lost';
        }
      }
      if(t.logoUrl) t.matched.logo=t.logoUrl;
    });

    var g={t1:teams[0],t2:teams[1],round:gameRound,detail:detail,date:toETDate(ev.date||''),evDate:ev.date||''};
    if(state==='in')        liveGames.push(g);
    else if(state==='post') completedGames.push(g);
    else                    upcomingGames.push(g);
  });

  renderAll();
}

function dateSectionLabel(ymd) {
  if(!ymd) return 'UPCOMING';
  if(knownR32Dates[ymd]) return 'ROUND OF 32 · '+fmtDate(ymd);
  return 'ROUND OF 64 · '+fmtDate(ymd);
}

function fmtDate(ymd) {
  if(!ymd) return '';
  var months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var parts=ymd.split('-');
  return months[parseInt(parts[1],10)-1]+' '+parseInt(parts[2],10);
}

function startPolling() {
  function fetchAll() {
    var today=toETDate(new Date().toISOString());
    var yesterday=toETDate(new Date(Date.now()-86400000).toISOString());
    var tomorrow=toETDate(new Date(Date.now()+86400000).toISOString());
    var dates=[yesterday,today,tomorrow].filter(function(d,i,a){ return d&&a.indexOf(d)===i; });
    Promise.all(dates.map(function(d){
      return fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates='+d.replace(/-/g,''))
        .then(function(r){return r.json();}).catch(function(){return null;});
    })).then(function(results){
      var merged={events:[]};
      results.forEach(function(r){
        if(r&&r.events) merged.events=merged.events.concat(r.events);
      });
      processESPN(merged);
    });
  }
  fetchAll();
  setInterval(fetchAll, 30000);
}

function logoImg(t, size, radius) {

function ownerTag(oid, size) {
  var o=OWNERS[oid]; if(!o) return '';
  size=size||8;
  return '<span style="background:'+o.color+';color:#000;font-size:'+size+'px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.2px">'+o.name+'</span>';
}

/* ═══════════════════════════════════════════════════════
   RENDER — TEAMS (3-col alive grid)
═══════════════════════════════════════════════════════ */

function renderTeams() {
  var el    = document.getElementById('owner-list');
  var label = document.getElementById('teams-label');
  if(!el) return;

  var r1pp = getR1PerTeam();

  /* Sort owners by net P&L descending */
  var ownerIds = Object.keys(OWNERS).sort(function(a,b){ return ownerNet(b)-ownerNet(a); });

  var aliveTotal = TEAMS.filter(function(t){ return t.status!=='lost'; }).length;
  label.textContent = aliveTotal+' Teams Alive · '+ownerIds.length+' Owners';

  el.innerHTML = ownerIds.map(function(oid){
    var o       = OWNERS[oid];
    var earned  = ownerEarned(oid);
    var net     = ownerNet(oid);
    var netStr  = (net>=0?'+$':'-$')+c(Math.abs(net));
    var netCls  = net>=0?'ocard-net pos':'ocard-net';
    var hasLive = TEAMS.some(function(t){ return t.owner===oid && t.status==='live'; });

    /* Split earned into team R1 earnings vs side bet earnings */
    var r1pp = getR1PerTeam();
    var teamEarnedAmt = 0;
    TEAMS.forEach(function(t){ if(t.owner===oid && t.r1eligible && t.wonR1) teamEarnedAmt += r1pp; });
    var spEarn = computeSidePots();
    var sideBetAmt = 0;
    if(spEarn.lossConfirmed    && spEarn.lossWinners.indexOf(oid)>-1)   sideBetAmt += POTS.loss/spEarn.lossWinners.length;
    if(spEarn.upsetWinners.length && spEarn.upsetWinners.indexOf(oid)>-1) sideBetAmt += POTS.upset/spEarn.upsetWinners.length;
    if(spEarn.seed15Confirmed  && spEarn.seed15Winners.indexOf(oid)>-1) sideBetAmt += POTS.seed15/spEarn.seed15Winners.length;

    /* Sort teams: live → earned → alive → lost */
    var myTeams = TEAMS.filter(function(t){ return t.owner===oid; })
      .sort(function(a,b){
        function pri(t){
          if(t.status==='live')            return 0;
          if(t.wonR1 && t.r1eligible)      return 1;
          if(t.status==='won'||t.status==='alive') return 2+t.seed;
          return 100+t.seed; /* lost last */
        }
        return pri(a)-pri(b);
      });

    var aliveCount = myTeams.filter(function(t){ return t.status!=='lost'; }).length;

    var sp = computeSidePots();

    var chips = myTeams.map(function(t){
      var isLive    = t.status==='live';
      var isLost    = t.status==='lost';
      var hasEarned = t.wonR1 && t.r1eligible;
      var isBigLoss    = sp.lossTeams   && sp.lossTeams.indexOf(t.name)>-1;
      var isUpsetLeader= sp.upsetTeams  && sp.upsetTeams.indexOf(t.name)>-1;
      var is1516Win    = sp.seed15Teams && sp.seed15Teams.indexOf(t.name)>-1;
      var te        = teamEarned(t);
      var logoSrc   = t.logo||LOGOS[t.name]||'';
      var hasSidePot= isBigLoss||isUpsetLeader||is1516Win;
      var chipCls   = 'tchip'+(isLive?' live':hasEarned?' earned':isLost?' lost':'')+(hasSidePot?' sp-winner':'');

      var nm = t.name
        .replace('Saint ','St. ')
        .replace('Northern ','N. ')
        .replace(' State',' St.');
      if(nm.length > 11) nm = nm.substring(0,10)+'…';

      var logoHtml = logoSrc
        ? '<img src="'+logoSrc+'" class="tchip-logo" onerror="this.style.display=\'none\'">'
        : '<div class="tchip-logo-fb">'+t.seed+'</div>';

      var earnLine    = te>0 ? '<div class="tchip-earn">+$'+c(te)+' R1</div>' : '';
      var upsetBadge  = isUpsetLeader ? '<div class="tchip-upset-badge">⚡ UPSET LEADER</div>' : '';
      var lossBadge   = isBigLoss     ? '<div class="tchip-loss-badge">📉 BIGGEST LOSS</div>' : '';
      var seed15Badge = is1516Win     ? '<div class="tchip-seed15-badge">🏅 BEST 15/16</div>' : '';
      var liveDot     = isLive ? '<div class="tchip-live-dot"></div>' : '';

      return '<div class="'+chipCls+'">'
        + logoHtml
        + '<div class="tchip-info">'
          + '<div class="tchip-seed">#'+t.seed+'</div>'
          + '<div class="tchip-name">'+nm+'</div>'
          + earnLine
          + upsetBadge
          + lossBadge
          + seed15Badge
        + '</div>'
        + liveDot
      + '</div>';
    }).join('');

    return '<div class="ocard'+(hasLive?' has-live':'')+'" style="--oc:'+o.color+'">'
      + '<div class="ocard-hdr">'
        + '<div class="ocard-row1">'
          + '<div style="display:flex;align-items:center">'
            + '<div class="ocard-name">'+o.name+'</div>'
            + '<span class="ocard-alive-pill">'+aliveCount+' alive</span>'
          + '</div>'
          + '<div class="'+netCls+'">'+netStr+'</div>'
        + '</div>'
        + '<div class="ocard-row2">'
          + '<div class="ocard-stats">'
            + (teamEarnedAmt>0?'<b style="color:#4ade80">+$'+c(teamEarnedAmt)+'</b> teams':'')
            + (sideBetAmt>0?(teamEarnedAmt>0?' · ':'')+'<b style="color:#a78bfa">+$'+c(sideBetAmt)+'</b> side bets':'')
            + ((teamEarnedAmt>0||sideBetAmt>0)?' · ':'')
            + '<b style="color:#ef4444">-$'+c(o.paid)+'</b> spent'
          + '</div>'
          + '<div class="ocard-netlabel" style="color:'+o.color+'">NET</div>'
        + '</div>'
      + '</div>'
      + '<div class="ocard-teams">'+chips+'</div>'
    + '</div>';
  }).join('');
}

/* ═══════════════════════════════════════════════════════
   RENDER — GAMES (full-width matchup cards)
═══════════════════════════════════════════════════════ */

function renderGames() {
  var el = document.getElementById('games-content');
  if(!el) return;

  var html = '';
  var r1pp  = getR1PerTeam();
  var s16pp = computeS16PerTeam();

  /* Build one team side column */
  function teamCol(t, round, isDone, side) {
    var tm = t.matched;
    var isWinner = isDone && t.winner;
    var isLoser  = isDone && !t.winner;
    var nameCls  = 'mcard-tname'+(isWinner?' winner':isLoser?' loser':'');
    var logoSrc  = (tm&&tm.logo)||LOGOS[tm&&tm.name]||'';
    var logoHtml = logoSrc
      ? '<img src="'+logoSrc+'" class="mcard-logo" onerror="this.style.display=\'none\'">'
      : '<div class="mcard-logo-fb">'+(tm?tm.seed:'?')+'</div>';
    var nm = tm ? tm.name : (t.espnName||'TBD');
    if(nm.length>13) nm = nm.replace('Saint ','St. ').replace('Northern ','N. ').replace(' State',' St.');
    var ownHtml = tm ? ownerTag(tm.owner,8) : '';

    /* earn badge inline — only for upcoming/live */
    var earn = '';
    if(!isDone && tm) {
      if(round==='R64' && tm.r1eligible && !tm.wonR1 && r1pp>0)
        earn = '<div class="mcard-earn r1">+$'+c(r1pp)+' R1</div>';
      if(round==='R32' && tm.seed>=4 && s16pp>0)
        earn = '<div class="mcard-earn s16">+$'+c(s16pp)+' S16</div>';
    }

    return '<div class="mcard-side'+(side==='right'?' right':'')+'">'
      + logoHtml
      + '<div class="mcard-info">'
        + '<div class="'+nameCls+'">'+nm+'</div>'
        + '<div class="mcard-meta">'
          + (tm?'<span class="mcard-seed">#'+tm.seed+'</span>':'')
          + ownHtml
        + '</div>'
        + earn
      + '</div>'
    + '</div>';
  }

  /* Center column */
  function midLive(t1, t2) {
    return '<div class="mcard-mid">'
      + '<div class="mcard-scores"><span class="mcard-sc">'+t1.score+'</span>'
      + '<span class="mcard-sc-sep">–</span>'
      + '<span class="mcard-sc">'+t2.score+'</span></div>'
      + '<div class="mcard-status live">LIVE</div>'
    + '</div>';
  }
  function midVs() {
    return '<div class="mcard-mid"><div class="mcard-vs">VS</div></div>';
  }
  function midFinal(t1, t2) {
    return '<div class="mcard-mid">'
      + '<div class="mcard-scores">'
      + '<span class="mcard-sc'+(t1.winner?' win':' lose')+'">'+t1.score+'</span>'
      + '<span class="mcard-sc-sep">–</span>'
      + '<span class="mcard-sc'+(t2.winner?' win':' lose')+'">'+t2.score+'</span>'
      + '</div>'
      + '<div class="mcard-status">FINAL</div>'
    + '</div>';
  }

  /* Upset eligibility banner — shown on upcoming/live games where underdog win
     would beat or tie the current Biggest Upset leader seed diff               */
  function upsetBannerHtml(g) {
    var tm1 = g.t1.matched, tm2 = g.t2.matched;
    if(!tm1 || !tm2) return '';
    var diff = Math.abs(tm1.seed - tm2.seed);
    if(diff < 2) return ''; /* same-seed matchup or 1-diff — not interesting */
    var sp = computeSidePots();
    var leader = sp.bupsetDiff;
    var leaderOwner = sp.upsetWinners.length ? (OWNERS[sp.upsetWinners[0]]||{name:sp.upsetWinners[0]}).name : 'TBD';
    /* identify underdog (higher seed number) and favorite */
    var underdog = tm1.seed > tm2.seed ? tm1 : tm2;
    var fav      = tm1.seed > tm2.seed ? tm2 : tm1;
    var matchup  = '#'+underdog.seed+' over #'+fav.seed;
    if(diff > leader) {
      return '<div class="upset-banner beats">⚡ +'+diff+' differential — beats upset leader '+leaderOwner+'</div>';
    } else if(diff === leader) {
      return '<div class="upset-banner ties">⚡ +'+diff+' differential — ties upset leader '+leaderOwner+'</div>';
    }
    return '';
  }

  /* LIVE */
  if(liveGames.length) {
    html += '<div class="games-section"><div class="games-sec-hdr"><span class="live-dot"></span>LIVE NOW</div><div class="game-list">';
    liveGames.forEach(function(g){
      var t1=g.t1, t2=g.t2;
      html += '<div class="mcard live">'
        + '<div class="mcard-top"><div class="mcard-top-left"><span class="live-dot"></span><span class="mcard-round">'+g.round+'</span></div><div class="mcard-top-right">'+g.detail+'</div></div>'
        + upsetBannerHtml(g)
        + '<div class="mcard-body">'
          + teamCol(t1,g.round,false,'left')
          + midLive(t1,t2)
          + teamCol(t2,g.round,false,'right')
        + '</div>'
      + '</div>';
    });
    html += '</div></div>';
  }

  /* UPCOMING — grouped by date */
  if(upcomingGames.length) {
    var byDate={};
    upcomingGames.forEach(function(g){
      var d=g.date||'unknown'; if(!byDate[d]) byDate[d]=[];
      byDate[d].push(g);
    });
    Object.keys(byDate).sort().forEach(function(d){
      var lbl = d==='unknown'?'UPCOMING':dateSectionLabel(d);
      html += '<div class="games-section"><div class="games-sec-hdr">'+lbl+'</div><div class="game-list">';
      byDate[d].forEach(function(g){
        var t1=g.t1,t2=g.t2;
        html += '<div class="mcard">'
          + '<div class="mcard-top"><div class="mcard-top-left"><span class="mcard-round">'+g.round+'</span></div><div class="mcard-top-right">'+(g.detail||'TBD')+'</div></div>'
          + upsetBannerHtml(g)
          + '<div class="mcard-body">'
            + teamCol(t1,g.round,false,'left')
            + midVs()
            + teamCol(t2,g.round,false,'right')
          + '</div>'
        + '</div>';
      });
      html += '</div></div>';
    });
  }

  /* COMPLETED */
  if(completedGames.length) {
    var cByDate={};
    completedGames.forEach(function(g){
      var d=g.date||'unknown'; if(!cByDate[d]) cByDate[d]=[];
      cByDate[d].push(g);
    });
    Object.keys(cByDate).sort().reverse().forEach(function(d){
      var lbl = d==='unknown'?'COMPLETED':dateSectionLabel(d);
      var w1; /* winner name for header */
      html += '<div class="games-section"><div class="games-sec-hdr">'+lbl+' · FINAL</div><div class="game-list">';
      cByDate[d].forEach(function(g){
        var t1=g.t1,t2=g.t2;
        var w=t1.winner?t1:t2;
        html += '<div class="mcard final">'
          + '<div class="mcard-top">'
            + '<div class="mcard-top-left"><span class="mcard-round">'+g.round+'</span></div>'
            + '<div class="mcard-top-right" style="color:#22c55e;font-weight:700">'+(w.matched?w.matched.name:w.espnName||'')+'</div>'
          + '</div>'
          + '<div class="mcard-body">'
            + teamCol(t1,g.round,true,'left')
            + midFinal(t1,t2)
            + teamCol(t2,g.round,true,'right')
          + '</div>'
        + '</div>';
      });
      html += '</div></div>';
    });
  }

  if(!html) html='<div style="text-align:center;color:#2e2e44;font-size:12px;padding:40px 0;font-style:italic">Loading games…</div>';
  el.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════
   RENDER — STANDINGS
═══════════════════════════════════════════════════════ */

function renderStandings() {
  var el = document.getElementById('stand-list');
  if(!el) return;

  var owners = Object.keys(OWNERS).map(function(oid){
    return {oid:oid,o:OWNERS[oid],earned:ownerEarned(oid),net:ownerNet(oid)};
  }).sort(function(a,b){ return b.net-a.net; });

  el.innerHTML = owners.map(function(item,i){
    var oid=item.oid, o=item.o, net=item.net, earned=item.earned;
    var netCls = net>=0?'stand-net pos':'stand-net';
    var netStr = (net>=0?'+$':'-$')+c(Math.abs(net));

    var myTeams = TEAMS.filter(function(t){ return t.owner===oid && t.status!=='lost'; })
      .sort(function(a,b){
        if(a.status==='live'&&b.status!=='live') return -1;
        if(b.status==='live'&&a.status!=='live') return 1;
        return a.seed-b.seed;
      });

    var sp = computeSidePots();
    var ownsLoss  = sp.lossWinners  && sp.lossWinners.indexOf(oid)>-1;
    var ownsUpset = sp.upsetWinners && sp.upsetWinners.indexOf(oid)>-1;
    var owns1516  = sp.seed15Winners && sp.seed15Winners.indexOf(oid)>-1;

    /* include lost teams that won a side pot so they still appear in the chip row */
    var sidePotTeams = TEAMS.filter(function(t){
      if(t.owner!==oid || t.status!=='lost') return false;
      return (sp.lossTeams&&sp.lossTeams.indexOf(t.name)>-1)
          || (sp.upsetTeams&&sp.upsetTeams.indexOf(t.name)>-1)
          || (sp.seed15Teams&&sp.seed15Teams.indexOf(t.name)>-1);
    });
    var allChipTeams = myTeams.concat(sidePotTeams);

    var chips = allChipTeams.map(function(t){
      var isLive=t.status==='live';
      var isBigLoss  =(sp.lossTeams   && sp.lossTeams.indexOf(t.name)>-1);
      var isUpsetLead=(sp.upsetTeams  && sp.upsetTeams.indexOf(t.name)>-1);
      var is1516Win  =(sp.seed15Teams && sp.seed15Teams.indexOf(t.name)>-1);
      var te=teamEarned(t);
      var logoSrc=t.logo||LOGOS[t.name]||'';
      var logoHtml = logoSrc
        ? '<img src="'+logoSrc+'" class="stand-chip-logo" onerror="this.style.display=\'none\'">'
        : '<div class="stand-chip-logo-fb">'+t.seed+'</div>';
      var liveIcon = isLive ? '<div class="stand-chip-live"></div>' : '';
      var nm = t.name.replace('Saint ','St. ').replace('Northern ','N. ');
      if(nm.length>10) nm=nm.substring(0,10)+'…';
      var nameCls = te>0?'stand-chip-name earn':'stand-chip-name';
      var lossBadge   = isBigLoss   ? '<span style="font-size:7px;font-weight:800;color:#ef4444;margin-left:3px">📉</span>' : '';
      var upsetBadge  = isUpsetLead ? '<span style="font-size:7px;font-weight:800;color:#f59e0b;margin-left:3px">⚡</span>' : '';
      var seed15Badge = is1516Win   ? '<span style="font-size:7px;font-weight:800;color:#a78bfa;margin-left:3px">🏅</span>' : '';
      return '<div class="stand-team-chip">'+liveIcon+logoHtml+'<span class="'+nameCls+'">#'+t.seed+' '+nm+'</span>'+lossBadge+upsetBadge+seed15Badge+'</div>';
    }).join('');

    /* side pot badges on owner card */
    var lossBadgeCard  = ownsLoss
      ? '<div class="ocard-loss-badge">📉 Biggest R1 Loss · +$'+c(POTS.loss)+'</div>'
      : '';
    var upsetBadgeCard = ownsUpset
      ? '<div class="ocard-loss-badge" style="color:#f59e0b;background:#1a1000;border-color:rgba(245,158,11,.2)">⚡ Biggest Upset · +$'+c(POTS.upset)+' (leader)</div>'
      : '';
    var seed15BadgeCard = owns1516
      ? '<div class="ocard-loss-badge" style="color:#a78bfa;background:#0e0a1a;border-color:rgba(167,139,250,.2)">🏅 Best 15/16 · +$'+c(POTS.seed15)+'</div>'
      : '';

    var anyBadge = ownsLoss||ownsUpset||owns1516;
    return '<div class="stand-card" style="--oc:'+o.color+'">'
      + '<div class="stand-rank">#'+(i+1)+'</div>'
      + '<div class="'+netCls+'">'+netStr+'</div>'
      + '<div class="stand-name">'+o.name+'</div>'
      + lossBadgeCard + upsetBadgeCard + seed15BadgeCard
      + '<div class="stand-stats" style="margin-top:'+(anyBadge?'5':'')+'px">'
        + '<b>$'+c(earned)+'</b> earned · <b>$'+c(o.paid)+'</b> paid'
        + (myTeams.length?' · <b>'+myTeams.length+'</b> alive':'')
      + '</div>'
      + '<div class="stand-teams">'+chips+'</div>'
    + '</div>';
  }).join('');
}

/* ═══════════════════════════════════════════════════════
   RENDER — PAYOUTS
═══════════════════════════════════════════════════════ */

function renderPayouts() {
  var el = document.getElementById('pay-list');

  var r1pp = getR1PerTeam();

  var s16Eligible = TEAMS.filter(function(t){ return t.seed>=4 && t.status!=='lost'; });

  var r1Html = r1w.length
    ? r1w.map(function(t){
        return '<div class="pwinner">'+pLogoImg(t)+'<span class="pw-name">'+t.name+'</span>'+ownerTag(t.owner,8)+'<span class="pw-amt">+$'+c(r1pp)+'</span></div>';

  var html =
    '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">Round of 64 Winners</div><div class="pcard-pct">10% of pot · seeds 8–16 only · split equally</div></div><div class="pcard-amt">$'+c(POTS.r1)+'</div></div>'
    + '<div class="pcard-note">$'+c(r1pp)+' per winner · '+r1w.length+' confirmed</div>'
    + '<div class="pcard-winners">'+r1Html+'</div>'
    + '</div>'

    + '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">Sweet 16</div><div class="pcard-pct">23% of pot · seeds 4–16 only · split equally</div></div><div class="pcard-amt">$'+c(POTS.s16)+'</div></div>'
    + '<div class="pcard-note">~$'+c(computeS16PerTeam())+'/team if 16 advance · '+s16Eligible.length+' eligible still alive</div>'

    + '</div>'

    + '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">Elite 8</div><div class="pcard-pct">10% of pot · seeds 1–3 only · split equally</div></div><div class="pcard-amt">$'+c(POTS.e8)+'</div></div>'
    + '<div class="pcard-note">'+TEAMS.filter(function(t){return t.top3&&t.status!=='lost';}).length+' seeds 1–3 still alive</div>'
    + '<div class="pcard-tbd">Winners determined after Sweet 16</div>'
    + '</div>'

    + '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">Final Four</div><div class="pcard-pct">28% of pot · fixed per team</div></div><div class="pcard-amt">$'+c(POTS.f4*4)+'</div></div>'
    + '<div class="pcard-note">$'+c(POTS.f4)+' per team — fixed, no dilution</div>'
    + '</div>'

    + '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">Championship Game</div><div class="pcard-pct">8% of pot · both finalists</div></div><div class="pcard-amt">$'+c(POTS.finals*2)+'</div></div>'
    + '<div class="pcard-note">$'+c(POTS.finals)+' per finalist</div>'
    + '</div>'

    + '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">National Champion</div><div class="pcard-pct">9% of pot · winner takes all</div></div><div class="pcard-amt">$'+c(POTS.champ)+'</div></div>'
    + '</div>';

  /* Side pots — use shared computeSidePots() */
  var sp = computeSidePots();

  function dn(name){ return name==='Prairie View/Lehigh'?'Prairie View':name; } /* display name */

  function sidePotWinnerHtml(teams, owners, amt, extra) {
    if(!teams.length) return '';
    var isSplit=teams.length>1;
    var splitAmt=c(amt/teams.length);
    return '<div class="pcard-leader">'
      +(isSplit?'<b style="color:#f59e0b">Split pot</b> — ':'<b style="color:#22c55e">Winner:</b> ')
      +teams.map(function(nm,i){
        return '<b style="color:#c4c4dc">'+dn(nm)+'</b> '+ownerTag(owners[i],8)+(isSplit?' ($'+splitAmt+')':'');
      }).join(' & ')
      +(extra?' <span style="color:#5a5a7a">— '+extra+'</span>':'')
      +'</div>';
  }

  function tblOwner(oid){
    var o=OWNERS[oid]; if(!o) return '';
    return '<span class="sp-owner" style="background:'+o.color+'">'+o.name+'</span>';
  }

  /* ── BIGGEST LOSS ─────────────────────────────────── */
  var blossWinner;
  if(sp.lossConfirmed){
    blossWinner=sidePotWinnerHtml(sp.lossTeams,sp.lossWinners,POTS.loss,'Florida 114–55 · lost by 59 pts');

    +'<div class="pcard-detail-body">'

    +'<tr><td>Long Island</td><td>'+tblOwner('topper')+'</td><td>92–58</td><td class="sp-margin">34</td></tr>'

    +'<tr><td>UMBC/Howard</td><td>'+tblOwner('topper')+'</td><td>101–80</td><td class="sp-margin">21</td></tr>'
    +'<tr><td>Hofstra</td><td>'+tblOwner('curt')+'</td><td>87–69</td><td class="sp-margin">18</td></tr>'

    +'<tr><td>Saint Mary\'s</td><td>'+tblOwner('topper')+'</td><td>63–50</td><td class="sp-margin">13</td></tr>'
    +'<tr><td>Furman</td><td>'+tblOwner('topper')+'</td><td>82–71</td><td class="sp-margin">11</td></tr>'
    +'<tr><td>Villanova</td><td>'+tblOwner('topper')+'</td><td>86–76</td><td class="sp-margin">10</td></tr>'
    +'<tr><td>Kennesaw St.</td><td>'+tblOwner('curt')+'</td><td>73–64</td><td class="sp-margin">9</td></tr>'
    +'<tr><td>BYU</td><td>'+tblOwner('dolla')+'</td><td>79–71</td><td class="sp-margin">8</td></tr>'
    +'<tr><td>Siena</td><td>'+tblOwner('stark')+'</td><td>71–65</td><td class="sp-margin">6</td></tr>'
    +'<tr><td>Clemson</td><td>'+tblOwner('stark')+'</td><td>67–61</td><td class="sp-margin">6</td></tr>'
    +'<tr><td>Santa Clara</td><td>'+tblOwner('stark')+'</td><td>89–84 OT</td><td class="sp-margin">5</td></tr>'
    +'<tr><td>UNC</td><td>'+tblOwner('dolla')+'</td><td>82–78 OT</td><td class="sp-margin">4</td></tr>'
    +'<tr><td>Ohio State</td><td>'+tblOwner('stark')+'</td><td>66–64</td><td class="sp-margin">2</td></tr>'
    +'<tr><td>Wisconsin</td><td>'+tblOwner('hudd')+'</td><td>83–82</td><td class="sp-margin">1</td></tr>'
    +'</tbody></table></div></details>';

  /* ── BIGGEST UPSET ────────────────────────────────── */
  var bupsetWinner;
  if(sp.upsetTeams.length){
    var be0=sp.bupsetEntries[0]||{};
    var rl=be0.round==='R64'?'R1':be0.round||'R1';
    bupsetWinner=sidePotWinnerHtml(sp.upsetTeams,sp.upsetWinners,POTS.upset,'+'+sp.bupsetDiff+' seed diff ('+rl+')');
  } else {
    bupsetWinner='<div class="pcard-tbd">Largest seed differential — any round</div>';
  }
  var upsetRows = sp.allUpsets.map(function(e){
    var wm=e.winner.matched, lm=e.loser.matched;
    var isWinner = sp.upsetTeams.indexOf(wm.name)>-1;
    var rl = e.round==='R64'?'R1':e.round;
    return '<tr'+(isWinner?' class="sp-win"':'')+'>'
      +'<td>'+wm.name+'</td><td>#'+wm.seed+'</td>'
      +'<td>'+lm.name+'</td><td>#'+lm.seed+'</td>'
      +'<td class="'+(isWinner?'sp-w ':'')+'sp-margin">+'+e.diff+'</td>'
      +'<td>'+rl+'</td>'
      +'<td>'+tblOwner(wm.owner)+'</td>'
    +'</tr>';
  }).join('');
  var upsetDropdown = '<details class="pcard-details"><summary></summary>'
    +'<div class="pcard-detail-body">'
    +'<table class="pcard-tbl"><thead><tr><th>Winner</th><th>Seed</th><th>Beat</th><th>Seed</th><th>Diff</th><th>Rnd</th><th>Owner</th></tr></thead><tbody>'
    +(upsetRows||'<tr><td colspan="7" style="color:#3a3a55">No upsets recorded yet</td></tr>')
    +'</tbody></table>'
    +'<div style="font-size:8px;color:#3a3a55;margin-top:7px">⚡ Moving target — updates each round if a larger upset occurs.</div>'
    +'</div></details>';

  /* ── BEST 15/16 ───────────────────────────────────── */
  var best1516Winner;
  if(sp.alive1516.length){
    best1516Winner='<div class="pcard-leader">Still alive: '+sp.alive1516.map(function(t){return '<b style="color:#22c55e">#'+t.seed+' '+t.name+'</b> '+ownerTag(t.owner,8);}).join(' · ')+'</div>';
  } else if(sp.seed15Confirmed){
    var sd=sp.seed15Data;
    var sdLbl=sd?(sd.round==='R64'?'lost in R1':sd.round==='R32'?'won R1, lost in R2':'reached '+sd.round):'lost in R1';

    best1516Winner=sidePotWinnerHtml(sp.seed15Teams,sp.seed15Winners,POTS.seed15,sdLbl+sdMargin);

    +'<tr><td>Idaho</td><td>#15</td><td>South</td><td>'+tblOwner('topper')+'</td><td>Houston</td><td>78–47</td><td class="sp-margin">31</td></tr>'
    +'<tr><td>Queens</td><td>#15</td><td>West</td><td>'+tblOwner('topper')+'</td><td>Purdue</td><td>104–71</td><td class="sp-margin">33</td></tr>'
    +'<tr><td>Tennessee St.</td><td>#15</td><td>Midwest</td><td>'+tblOwner('topper')+'</td><td>Iowa State</td><td>108–74</td><td class="sp-margin">34</td></tr>'
    +'<tr><td>Long Island</td><td>#16</td><td>West</td><td>'+tblOwner('topper')+'</td><td>Arizona</td><td>92–58</td><td class="sp-margin">34</td></tr>'
    +'<tr><td>Prairie View</td><td>#16</td><td>South</td><td>'+tblOwner('stark')+'</td><td>Florida</td><td>114–55</td><td class="sp-l sp-margin">59</td></tr>'
    +'</tbody></table></div></details>';

  html += '<div class="pcard-sec">Special Side Pots</div>'
    + '<div class="pcard"><div class="pcard-hdr"><div><div class="pcard-name">📉 Biggest R1 Loss</div><div class="pcard-pct">4% of pot · R64 only · CONFIRMED</div></div><div class="pcard-amt">$'+c(POTS.loss)+'</div></div><div class="pcard-rule">Largest point-margin defeat in R64. Tie → lowest pts scored. Tie → split.</div>'+blossWinner+blossDropdown+'</div>'
    + '<div class="pcard"><div class="pcard-hdr"><div><div class="pcard-name">⚡ Biggest Upset</div><div class="pcard-pct">4% of pot · any round · MOVING TARGET</div></div><div class="pcard-amt">$'+c(POTS.upset)+'</div></div><div class="pcard-rule">Largest seed diff upset, any round. Tie → higher seed wins. Tie → split.</div>'+bupsetWinner+upsetDropdown+'</div>'

  el.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════
   TAB SWITCHING
═══════════════════════════════════════════════════════ */

function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('panel-'+name).classList.add('on');
  btn.classList.add('on');
  document.getElementById('scroll-area').scrollTop = 0;
  renderAll();
}

/* ═══════════════════════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════════════════════ */

function renderAll() {
  var hasR32=[].concat(liveGames,upcomingGames,completedGames).some(function(g){return g.round==='R32';});
  var rt=document.getElementById('round-txt');
  if(rt) rt.textContent=(hasR32?'R32':'R64')+' · Live';
  renderTeams();
  renderGames();
  renderStandings();
  renderPayouts();
}

/* ── BOOT ─────────────────────────────────────────────── */
renderAll();
startPolling();
