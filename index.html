<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Calcutta 2026</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:#08080f;
  color:#e2e2ef;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
  height:100%;
  overflow:hidden;
}

/* ── LAYOUT ─────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:430px;margin:0 auto;position:relative}

/* ── HEADER ─────────────────────────────────────────── */
.hdr{
  padding:env(safe-area-inset-top,12px) 16px 10px;
  padding-top:max(env(safe-area-inset-top),16px);
  background:#08080f;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  border-bottom:1px solid #13131e;
}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:-.4px;color:#fff}
.hdr-sub{font-size:11px;color:#3a3a55;margin-top:1px;letter-spacing:.3px}
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:#160d0d;border:1px solid rgba(224,82,82,.4);
  border-radius:20px;padding:4px 10px;
  font-size:10px;font-weight:700;letter-spacing:1.5px;color:#e05252;
  text-transform:uppercase;white-space:nowrap;
}
.live-badge.complete{background:#0c1220;border-color:rgba(59,130,246,.35);color:#60a5fa}
.live-badge.complete .live-dot{display:none}
.live-dot{width:5px;height:5px;border-radius:50%;background:#e05252;animation:pulse 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes amber-pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SCROLL AREA ─────────────────────────────────────── */
.scroll-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:8px 10px 0;
}

/* ── BOTTOM NAV ──────────────────────────────────────── */
.bottom-nav{
  display:flex;flex-shrink:0;
  background:#0c0c16;
  border-top:1px solid #13131e;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:10px 4px 8px;
  border:none;background:transparent;
  color:#3a3a55;font-size:10px;font-weight:500;
  cursor:pointer;transition:color .15s;
  min-height:54px;
}
.nav-btn.on{color:#e2e2ef}
.nav-btn.on .nav-icon{color:#f59e0b}
.nav-icon{font-size:20px;line-height:1;transition:color .15s}
.nav-label{font-size:10px;letter-spacing:.3px}

/* ── PANELS ──────────────────────────────────────────── */
.panel{display:none}
.panel.on{display:block}

/* ── SECTION LABEL ───────────────────────────────────── */
.sec-label{
  font-size:10px;font-weight:600;letter-spacing:2.5px;
  color:#3a3a55;text-transform:uppercase;
  margin:16px 0 8px;
}
.sec-label:first-child{margin-top:0}

/* ══════════════════════════════════════════════════════
   TEAMS TAB — grouped by owner
══════════════════════════════════════════════════════ */
.owner-list{display:flex;flex-direction:column;gap:5px;padding-bottom:10px}

.ocard{
  background:#111119;border-radius:9px;
  overflow:hidden;border:1px solid #1a1a27;
  position:relative;
}
.ocard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--oc)}
.ocard.has-live{border-color:rgba(245,158,11,.3)}

/* owner header — single tight line */
.ocard-hdr{
  display:flex;align-items:center;gap:0;
  padding:6px 11px 5px;
  flex-wrap:nowrap;overflow:hidden;
}
.ocard-name{font-size:14px;font-weight:800;color:var(--oc);line-height:1;letter-spacing:-.2px;white-space:nowrap;flex-shrink:0}
.ocard-hdr-sep{color:#252538;font-size:10px;margin:0 5px;flex-shrink:0}
.ocard-hdr-meta{font-size:9px;color:#3a3a55;white-space:nowrap;flex-shrink:0}
.ocard-hdr-meta b{font-weight:700;color:#4a4a66}
.ocard-hdr-right{margin-left:auto;display:flex;align-items:center;gap:4px;flex-shrink:0}
.ocard-sp-pill{font-size:7px;font-weight:700;border-radius:20px;padding:1px 5px;letter-spacing:.2px;white-space:nowrap;border:1px solid transparent}
.ocard-sp-pill.upset {color:#f59e0b;background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3)}
.ocard-sp-pill.loss  {color:#ef4444;background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3)}
.ocard-sp-pill.seed15{color:#a78bfa;background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.3)}

/* ── TEAMS tab chip rows ─────────────────────────────── */
.ocard-teams{
  padding:5px 11px 7px;
  border-top:1px solid #16161f;
  display:flex;flex-direction:column;gap:4px;
}
.ocard-alive-row{display:flex;flex-wrap:wrap;gap:3px;align-items:flex-start;}

/* alive chip — mirrors .stand-team-chip but slightly brighter */
.tchip{
  display:inline-flex;align-items:center;gap:3px;
  background:#161625;border-radius:5px;
  padding:2px 6px 2px 3px;
  flex-shrink:0;width:auto;
}
.tchip.live  {background:#140f04;}
.tchip.earned{background:#0b130b;}

.tchip-logo{width:16px;height:16px;border-radius:3px;object-fit:contain;background:#eeeef6;flex-shrink:0}
.tchip-logo-fb{width:16px;height:16px;border-radius:3px;background:#eeeef6;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:800;color:#34344a;flex-shrink:0}

.tchip-label{font-size:10px;font-weight:500;color:#7070aa;white-space:nowrap}
.tchip-label .tchip-seed{font-weight:700;color:#3a3a55}
.tchip.live   .tchip-label{color:#f59e0b}
.tchip.live   .tchip-label .tchip-seed{color:#8a5f00}
.tchip.earned .tchip-label{color:#4ade80}
.tchip.earned .tchip-label .tchip-seed{color:#1d5c28}

.tchip-earn{font-size:7px;font-weight:800;color:#4ade80;margin-left:2px}
.tchip-sp-icon{font-size:8px;margin-left:1px;line-height:1}
.tchip-live-dot{width:5px;height:5px;border-radius:50%;background:#f59e0b;
  animation:amber-pulse 1s ease-in-out infinite;flex-shrink:0;margin-left:2px}

/* ── lost line — plain text, no chips ───────────────── */
.ocard-lost-row{
  font-size:8px;color:#2e2e45;line-height:1.4;
  border-top:1px solid #14141e;
  padding-top:4px;margin-top:0;
}
.ocard-lost-lbl{font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-right:5px;color:#282838}
.ocard-lost-sep{color:#222232}
.ocard-lost-sp{color:#3e2e5a}
.ocard-lost-earned{color:#2d5c36} /* dim green — previously earned R1 */
/* owner card loss badge — shown in standings */
.ocard-loss-badge{display:inline-flex;align-items:center;gap:3px;font-size:8px;font-weight:800;color:#ef4444;background:#1a0808;border:1px solid rgba(239,68,68,.2);border-radius:4px;padding:2px 6px;margin-top:5px}

/* ── Scoring breakdown toggle ───────────────────────── */
.sb-toggle{
  display:flex;align-items:center;justify-content:center;gap:5px;
  width:100%;padding:5px 11px;
  border:none;background:none;
  border-top:1px solid #14141e;
  font-size:9px;font-weight:700;letter-spacing:1px;color:#7070a0;
  text-transform:uppercase;cursor:pointer;
  transition:color .15s;
}
.sb-toggle:hover{color:#9090c0}
.sb-toggle.open{color:#9090c8}
.sb-chevron{display:inline-block;transition:transform .2s;font-style:normal}
.sb-toggle.open .sb-chevron{transform:rotate(180deg)}

.sb-wrap{display:none;border-top:1px solid #14141e;padding:9px 11px 8px}
.sb-wrap.open{display:block}

.sb-team{margin-bottom:7px}
.sb-team:last-child{margin-bottom:0}
.sb-thdr{
  display:flex;align-items:center;gap:4px;
  margin-bottom:3px;
}
.sb-thdr-logo{width:16px;height:16px;border-radius:3px;object-fit:contain}
.sb-thdr-logo-fb{width:16px;height:16px;border-radius:3px;background:#eeeef6;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#34344a}
.sb-thdr-name{font-size:10px;font-weight:700;color:#9090b8;letter-spacing:.2px}
.sb-thdr-seed{color:#5a5a80;font-weight:500;margin-right:2px}

.sb-row{
  display:flex;align-items:center;
  padding:1px 0 1px 20px;
  font-size:10px;gap:6px;
}
.sb-pot{
  min-width:36px;font-weight:700;letter-spacing:.5px;
  font-size:8px;text-transform:uppercase;color:#5a5a80;
}
.sb-desc{flex:1;color:#7070a0}
.sb-amt{font-weight:700;font-size:10px;color:#8888b8;white-space:nowrap}
.sb-row.earned .sb-desc{color:#6aaa74}
.sb-row.earned .sb-amt{color:#4ade80}
.sb-row.earned .sb-pot{color:#4a8a56}

.sb-divider{
  border:none;border-top:1px solid #14141e;
  margin:5px 0;
}
.sb-sidepot-hdr{
  font-size:8px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;color:#2e2e45;margin-bottom:3px;
}
.sb-sidepot-row{
  display:flex;align-items:center;gap:5px;
  font-size:10px;padding:1px 0;
}
.sb-sidepot-icon{font-size:10px}
.sb-sidepot-desc{flex:1;color:#4a4a68}
.sb-sidepot-amt{font-weight:700;color:#4ade80}

.sb-footnote{
  font-size:9px;color:#2a2a40;
  border-top:1px solid #14141e;
  margin-top:8px;padding-top:7px;
  line-height:1.5;
}

/* ══════════════════════════════════════════════════════
   SPLASH MODAL
══════════════════════════════════════════════════════ */
#splash-overlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
}
#splash-box{
  background:#0f0f1e;border:1px solid #1e1e35;border-radius:18px;
  width:100%;max-width:360px;overflow:hidden;
}
.splash-hdr{
  padding:18px 18px 14px;
  border-bottom:1px solid #14141e;
}
.splash-title{font-size:13px;font-weight:800;color:#e2e2ef;letter-spacing:.2px}
.splash-sub{font-size:10px;color:#3a3a58;margin-top:2px;letter-spacing:.3px}

.splash-section{padding:14px 18px;border-bottom:1px solid #14141e}
.splash-sec-lbl{
  font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:#2e2e48;margin-bottom:10px;
}
/* top 3 */
.splash-podium{display:flex;flex-direction:column;gap:7px}
.splash-rank-row{display:flex;align-items:center;gap:8px}
.splash-rank-num{font-size:10px;font-weight:700;color:#2e2e45;width:14px;text-align:right;flex-shrink:0}
.splash-rank-name{flex:1;font-size:13px;font-weight:700}
.splash-rank-net{font-size:13px;font-weight:800}
.splash-rank-net.pos{color:#22c55e}
.splash-rank-net.neg{color:#3a3a58}

/* live games logos */
.splash-games{display:flex;flex-wrap:wrap;justify-content:center;gap:6px}
.splash-game-pair{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:#161625;border-radius:12px;
  padding:7px 10px;
}
.splash-game-row{display:flex;align-items:center;gap:5px}
.splash-logo{width:26px;height:26px;border-radius:6px;object-fit:contain;background:#eeeef6}
.splash-logo-fb{width:26px;height:26px;border-radius:6px;background:#eeeef6;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#34344a}
.splash-vs{font-size:8px;color:#22223a;font-weight:700}
.splash-score{font-size:11px;font-weight:700;color:#7070aa;min-width:14px;text-align:center}
.splash-live-dot{width:5px;height:5px;border-radius:50%;background:#ef4444;flex-shrink:0;animation:red-pulse 1s ease-in-out infinite}
.splash-game-detail{font-size:8px;font-weight:600;color:#7878a8;white-space:nowrap;text-align:center;width:100%}
@keyframes red-pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* round alert */
.splash-alert{
  margin:0;padding:10px 18px;
  background:rgba(245,158,11,.07);border-bottom:1px solid rgba(245,158,11,.15);
  display:flex;align-items:center;gap:7px;
  font-size:10px;color:#a07020;line-height:1.4;
}
.splash-alert-dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;flex-shrink:0;animation:amber-pulse 1s ease-in-out infinite}

/* updates */
.splash-updates{padding:10px 18px;border-top:1px solid #14141e}
.splash-updates-list{
  list-style:disc;margin:0;padding:0 0 0 14px;
  display:flex;flex-direction:column;gap:5px;
}
.splash-updates-list li{font-size:9px;color:#3a3a58;line-height:1.4}

/* dismiss */
.splash-footer{padding:14px 18px}
.splash-dismiss{
  width:100%;padding:11px;border:none;border-radius:10px;
  background:#f59e0b;color:#0a0a14;font-size:13px;font-weight:700;
  cursor:pointer;letter-spacing:.2px;
}

/* ══════════════════════════════════════════════════════
   GAMES TAB — full-width matchup cards
══════════════════════════════════════════════════════ */
.games-section{margin-bottom:16px}
.games-sec-hdr{
  font-size:10px;font-weight:700;letter-spacing:2.5px;
  color:#3a3a55;text-transform:uppercase;
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.games-sec-hdr .live-dot{width:6px;height:6px;background:#ef4444}
.game-list{display:flex;flex-direction:column;gap:8px}
.e8-live-banner{
  display:flex;align-items:center;gap:7px;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:#f59e0b;margin-bottom:8px;
}


/* ── MATCHUP CARD ────────────────────────────────────── */
.mcard{background:#111119;border-radius:12px;overflow:hidden;border:1px solid #1a1a27}
.mcard.live{border-color:rgba(239,68,68,.4);background:#0f0808}
.mcard.final{border-color:#16161f;opacity:.85}

/* top bar: round label + time/status */
.mcard-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 11px 5px;border-bottom:1px solid #15151e;
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  color:#7878a8;text-transform:uppercase;
}
.mcard.live .mcard-top{color:#ef4444;background:#180808}
.mcard-top-right{font-size:9px;font-weight:600;color:#7878a8;letter-spacing:.5px}
.mcard.live .mcard-top-right{color:#ef4444}

/* body: symmetric 3-col grid — left team | center | right team */
.mcard-body{display:grid;grid-template-columns:1fr 58px 1fr;align-items:center;min-height:58px}

/* team side — left aligns left, right aligns right */
.mcard-side{display:flex;align-items:center;gap:7px;padding:9px 6px 9px 11px}
.mcard-side.right{flex-direction:row-reverse;padding:9px 11px 9px 6px}

/* logo */
.mcard-logo{width:30px;height:30px;border-radius:7px;object-fit:contain;background:#eeeef6;flex-shrink:0}
.mcard-logo-fb{width:30px;height:30px;border-radius:7px;background:#eeeef6;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#34344a;flex-shrink:0}
.mcard.live .mcard-logo,.mcard.live .mcard-logo-fb{box-shadow:0 0 0 1.5px rgba(239,68,68,.4)}

/* text info block */
.mcard-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.mcard-side.right .mcard-info{align-items:flex-end}
.mcard-tname{font-size:12px;font-weight:600;color:#cccce0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.mcard-tname.winner{color:#22c55e}
.mcard-tname.loser{color:#252535;text-decoration:line-through}
.mcard-meta{display:flex;align-items:center;gap:4px;flex-wrap:nowrap}
.mcard-side.right .mcard-meta{flex-direction:row-reverse}
.mcard-seed{font-size:9px;font-weight:700;color:#7878a8}
/* inline earn badge */
.mcard-earn{font-size:8px;font-weight:800;padding:1px 5px;border-radius:3px;white-space:nowrap;margin-top:1px}
.mcard-earn.r1 {background:#0d1a07;color:#4ade80}
.mcard-earn.s16{background:#0d0d20;color:#818cf8}
/* upset eligibility banner — sits between top bar and body */
.upset-banner{
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:4px 11px;font-size:8px;font-weight:800;letter-spacing:.8px;
  text-transform:uppercase;border-bottom:1px solid transparent;
}
.upset-banner.beats{
  background:rgba(245,158,11,.12);color:#f59e0b;
  border-bottom-color:rgba(245,158,11,.2);
}
.upset-banner.ties{
  background:rgba(245,158,11,.06);color:#b97f20;
  border-bottom-color:rgba(245,158,11,.1);
}

/* center col: score or VS + status label */
.mcard-mid{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;padding:6px 0;
  border-left:1px solid #15151e;border-right:1px solid #15151e;
  height:100%;
}
.mcard-scores{display:flex;align-items:center;gap:3px}
.mcard-sc{font-size:17px;font-weight:800;line-height:1;color:#4a4a66}
.mcard-sc.win{color:#22c55e}
.mcard-sc.lose{color:#222230}
.mcard-sc-sep{font-size:11px;font-weight:600;color:#252530}
.mcard-vs{font-size:11px;font-weight:800;color:#252530;letter-spacing:.5px}
.mcard-status{font-size:8px;font-weight:700;color:#3a3a55;letter-spacing:.8px;text-transform:uppercase}
.mcard-status.live{color:#ef4444;animation:pulse 1.4s ease-in-out infinite}

/* ══════════════════════════════════════════════════════
   STANDINGS TAB
══════════════════════════════════════════════════════ */


/* ══════════════════════════════════════════════════════
   PAYOUTS TAB
══════════════════════════════════════════════════════ */
.pay-list{display:flex;flex-direction:column;gap:8px;padding-bottom:16px}
.pcard{background:#111119;border-radius:14px;padding:14px;border:1px solid #1a1a27}
.pcard-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.pcard-name{font-size:13px;font-weight:700;color:#c0c0dc}
.pcard-pct{font-size:10px;color:#3a3a55;margin-top:2px}
.pcard-amt{font-size:16px;font-weight:800;color:#f59e0b;white-space:nowrap}
.pcard-note{font-size:10px;color:#4a4a66;margin-top:7px;line-height:1.65}
.pcard-rule{font-size:10px;color:#555570;margin-top:6px;line-height:1.6;background:#14141e;border-radius:7px;padding:8px 10px}
.pcard-sep{height:1px;background:#18182a;margin:9px 0}
.pcard-winners{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.pwinner{display:inline-flex;align-items:center;gap:6px;background:#18182a;border-radius:6px;padding:5px 9px 5px 5px}
.pw-logo{width:20px;height:20px;border-radius:5px;object-fit:contain;background:#eeeef6;flex-shrink:0}
.pw-logo-fb{width:20px;height:20px;border-radius:5px;background:#eeeef6;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#3a3a55;flex-shrink:0}
.pw-name{font-size:11px;color:#c0c0dc;font-weight:500}
.pw-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;color:#000}
.pw-amt{font-size:11px;font-weight:700;color:#22c55e;margin-left:2px}
.pcard-tbd{font-size:10px;color:#2a2a3a;font-style:italic;margin-top:7px}
.pcard-pending{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;padding-top:6px;border-top:1px solid #14141e}
.ppending{display:inline-flex;align-items:center;gap:5px;background:#111118;border-radius:6px;padding:4px 8px 4px 4px;opacity:.45}
.pp-name{font-size:10px;color:#44446a}
.pcard-leader{font-size:10px;color:#5a5a7a;margin-top:6px;line-height:1.6;background:#13131e;border-radius:6px;padding:7px 10px}
.pcard-sec{font-size:10px;font-weight:600;letter-spacing:2px;color:#3a3a55;text-transform:uppercase;margin:18px 0 8px}

/* ── SIDE POT EXPANDABLE ─────────────────────────────── */
.pcard-details{margin-top:9px}
.pcard-details summary{font-size:8px;font-weight:700;color:#3a3a55;cursor:pointer;letter-spacing:.8px;text-transform:uppercase;list-style:none;display:inline-flex;align-items:center;gap:5px;user-select:none}
.pcard-details summary::-webkit-details-marker{display:none}
.pcard-details summary::after{content:'▶ SEE LOGIC';font-size:7px}

var FORMSPREE_ID = 'mdawrkzg';

function openFeedback() {
  var ov = document.getElementById('feedback-overlay');
  ov.style.display = 'flex';
  document.getElementById('feedback-form-wrap').style.display = 'block';
  document.getElementById('feedback-success').style.display = 'none';
  document.getElementById('fb-error').style.display = 'none';
  document.getElementById('fb-msg').value = '';
}
function closeFeedback() {
  document.getElementById('feedback-overlay').style.display = 'none';
}
function submitFeedback() {
  var msg = (document.getElementById('fb-msg').value || '').trim();
  var name = (document.getElementById('fb-name').value || '').trim();
  var errEl = document.getElementById('fb-error');
  if(!msg) { errEl.textContent = 'Please enter a message.'; errEl.style.display='block'; return; }
  errEl.style.display = 'none';
  if(FORMSPREE_ID === 'YOUR_FORM_ID') {
    errEl.textContent = 'Form not configured yet — see FORMSPREE_ID in the code.';
    errEl.style.display = 'block'; return;
  }
  var btn = document.querySelector('#feedback-form-wrap button');
  btn.textContent = 'Sending…'; btn.disabled = true;
  fetch('https://formspree.io/f/' + FORMSPREE_ID, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({ name: name || 'Anonymous', message: msg })
  }).then(function(r){ return r.json(); }).then(function(data){
    if(data.ok) {
      document.getElementById('feedback-form-wrap').style.display = 'none';
      document.getElementById('feedback-success').style.display = 'block';
      setTimeout(closeFeedback, 2500);
    } else {
      errEl.textContent = 'Something went wrong. Try again.'; errEl.style.display='block';
      btn.textContent = 'Send →'; btn.disabled = false;
    }
  }).catch(function(){
    errEl.textContent = 'Network error. Check connection and try again.';
    errEl.style.display = 'block'; btn.textContent = 'Send →'; btn.disabled = false;
  });
}

TEAMS.forEach(function(t) {
  /* Set win flags first (don't touch status yet) */
  if (CONFIRMED_R1.indexOf(t.name) > -1)      t.wonR1 = true;

  if (CONFIRMED_ADV_TOP.indexOf(t.name) > -1) t.status = 'won';

/* ═══════════════════════════════════════════════════════
   CALCULATIONS
═══════════════════════════════════════════════════════ */

/* Exclude PLAYIN_TEAMS — Play-In game winners (Prairie View/Lehigh, UMBC/Howard, SMU/Miami OH)
   both match our combined team entries and incorrectly get wonR1=true from ESPN Play-In data,
   even though some then lost in R64. Use PLAYIN_TEAMS to avoid blocking real R32 losers. */
function getR1Winners() { return TEAMS.filter(function(t){ return t.r1eligible && t.wonR1 && PLAYIN_TEAMS.indexOf(t.name)===-1; }); }
function getR1PerTeam() { var w=getR1Winners().length; return w>0?Math.ceil(POTS.r1/w):0; }

/* Currency formatter — whole dollars with commas, no decimals */
function c(n){ return Math.round(Number(n)).toLocaleString('en-US'); }

/* S16 pot: split among seeds 4-16 who won R32 (made Sweet 16).
   During R32: always project from alive eligible seeds (avoids mid-round inflation
   when only a few winners exist). Lock to actual count only once R32 is over. */
function getS16Winners() { return TEAMS.filter(function(t){ return t.seed>=4 && t.wonR32; }); }
function computeS16PerTeam() {
  var cr = getCurrentRound();
  var r32Done = (cr==='S16'||cr==='E8'||cr==='F4'||cr==='NCG');
  if(r32Done) {
    var winners = getS16Winners();
    if(winners.length>0) return Math.ceil(POTS.s16/winners.length);
  }
  /* During/before R32: project from all seeds 4+ still alive, capped at 16 */
  var eligible = TEAMS.filter(function(t){ return t.seed>=4 && t.status!=='lost'; });
  var projected = Math.min(eligible.length, 16);
  return projected>0 ? Math.ceil(POTS.s16/projected) : 0;
}

/* E8 pot: split among seeds 1-3 who won S16 (made Elite 8).
   Lock to actuals once S16 is over; during/before S16 use bracket-aware projection. */
function getE8Winners() { return TEAMS.filter(function(t){ return t.top3 && t.wonS16; }); }
function computeE8Projected() {
  /* Confirmed: top-3 seeds that have already won their S16 game */
  var confirmed = TEAMS.filter(function(t){ return t.top3 && t.wonS16; }).length;
  /* Per undecided S16 game: top3-vs-top3 guarantees exactly 1 qualifier;
     top3-vs-other is optimistically 1; neither top3 contributes 0.
     This correctly handles e.g. Michigan St.(3) vs UConn(2) — one WILL be
     eliminated — whereas a naive alive-team count would double-count the pair. */
  var stillPlayable = 0;
  BRACKET_REGIONS.forEach(function(reg) {
    reg.s16.forEach(function(pair) {
      var t1 = bktTeam(pair.top), t2 = bktTeam(pair.bot);
      var t1alive = !!(t1 && !t1.wonS16 && t1.status!=='lost');
      var t2alive = !!(t2 && !t2.wonS16 && t2.status!=='lost');
      if(!t1alive && !t2alive) return; /* game already decided — skip */
      var top3 = (t1alive && t1&&t1.top3 ? 1 : 0) + (t2alive && t2&&t2.top3 ? 1 : 0);
      if(top3 >= 1) stillPlayable += 1; /* at most 1 top-3 can emerge per game */
    });
  });
  return confirmed + stillPlayable;
}
function computeE8PerTeam() {
  /* Always use bracket-aware projection — handles pre/mid/post S16 correctly.
     confirmed = top-3 seeds with wonS16; stillPlayable = undecided games with ≥1 top-3.
     Post-S16: stillPlayable→0 so result equals actual winner count automatically. */
  var projected = computeE8Projected();
  return projected>0 ? Math.ceil(POTS.e8/projected) : 0;
}

/* teamEarned: chip highlight color only — R1 bonus winners (seeds 8-16 that won R64) */
function teamEarned(t) {
  if(t.r1eligible && t.wonR1) return getR1PerTeam();
  return 0;
}

/* ─── SIDE POT COMPUTATION ────────────────────────────────────
   Single source of truth used by both renderPayouts() and ownerEarned().

   BIGGEST LOSS  (R64 only)
     Largest point-margin defeat. Tie → lowest points scored. Tie → split.

   BIGGEST UPSET (any round)
     Largest seed differential. Tie → higher seed number wins. Tie → split.

   BEST 15/16
     Furthest round reached. Tie (same round, both lost after R1) →
     smallest loss margin IN that round. Tie → split.
     If nobody won R1: smallest margin in R1. Tie → split.
─────────────────────────────────────────────────────────────── */
var _sidePotCache = null;
function computeSidePots() {
  if(_sidePotCache) return _sidePotCache;
  var roundOrder = {R64:1,R32:2,S16:3,E8:4,F4:5,NCG:6};
  var r64Games   = completedGames.filter(function(g){return g.round==='R64';});
  var r64Done    = r64Games.length >= 32;

  /* ── BIGGEST LOSS ──────────────────────────────────────── */
  var blossMargin=-1, blossMinPts=Infinity, blossEntries=[];
  r64Games.forEach(function(g){
    var w=g.t1.winner?g.t1:g.t2, l=g.t1.winner?g.t2:g.t1;
    if(!w||!l) return;
    var m=w.score-l.score, pts=l.score;
    if(m>blossMargin){
      blossMargin=m; blossMinPts=pts; blossEntries=[{loser:l,margin:m,pts:pts}];
    } else if(m===blossMargin){
      if(pts<blossMinPts){ blossMinPts=pts; blossEntries=[{loser:l,margin:m,pts:pts}]; }
      else if(pts===blossMinPts){ blossEntries.push({loser:l,margin:m,pts:pts}); } /* split */
    }
  });
  var lossWinners=[], lossTeams=[];
  blossEntries.forEach(function(e){ if(e.loser.matched){ lossWinners.push(e.loser.matched.owner); lossTeams.push(e.loser.matched.name); }});

  /* ── BIGGEST UPSET ─────────────────────────────────────── */
  var bupsetDiff=-1, bupsetTopSeed=-1, bupsetEntries=[];

  /* Step 1: seed allUpsets from confirmed hardcoded data (R64 + R32) */
  var allUpsets = CONFIRMED_R64_UPSETS.concat(CONFIRMED_R32_UPSETS,CONFIRMED_S16_UPSETS).map(function(u){
    var wt=TEAMS.find(function(t){return t.name===u.winner;})||{};
    var lt=TEAMS.find(function(t){return t.name===u.loser;})||{};
    return {
      winner:{matched:{name:u.winner,seed:u.wSeed,owner:wt.owner||''}},
      loser: {matched:{name:u.loser, seed:u.lSeed,owner:lt.owner||''}},
      diff:u.diff, round:u.round, confirmed:true
    };
  });

  /* Step 2: add ESPN-detected upsets from E8+ (R64+R32+S16 already covered above) */
  completedGames.forEach(function(g){
    if(g.round==='R64'||g.round==='R32'||g.round==='S16') return;
    var w=g.t1.winner?g.t1:g.t2, l=g.t1.winner?g.t2:g.t1;
    if(!w||!l||!w.matched||!l.matched) return;
    var diff=w.matched.seed-l.matched.seed;
    if(diff<=0) return;
    allUpsets.push({winner:w,loser:l,diff:diff,round:g.round});
  });

  /* Step 3: determine winner */
  allUpsets.forEach(function(e){
    var diff=e.diff, wseed=e.winner.matched.seed;
    if(diff>bupsetDiff){
      bupsetDiff=diff; bupsetTopSeed=wseed; bupsetEntries=[e];
    } else if(diff===bupsetDiff){
      if(wseed>bupsetTopSeed){ bupsetTopSeed=wseed; bupsetEntries=[e]; }
      else if(wseed===bupsetTopSeed){ bupsetEntries.push(e); }
    }
  });

  var upsetWinners=[], upsetTeams=[];
  bupsetEntries.forEach(function(e){ if(e.winner.matched){ upsetWinners.push(e.winner.matched.owner); upsetTeams.push(e.winner.matched.name); }});

  /* ── BEST 15/16 ────────────────────────────────────────── */
  var alive1516  = TEAMS.filter(function(t){return (t.seed===15||t.seed===16)&&t.status!=='lost';});
  var all1516Done= alive1516.length===0;
  var seed15Winners=[], seed15Teams=[], seed15Data=null;
  if(all1516Done){
    /* Build loss record for every 15/16 team */
    var records=[];
    completedGames.forEach(function(g){
      var w=g.t1.winner?g.t1:g.t2, l=g.t1.winner?g.t2:g.t1;
      if(!l||!l.matched) return;
      if(l.matched.seed!==15&&l.matched.seed!==16) return;
      records.push({team:l.matched,round:g.round,roundNum:roundOrder[g.round]||0,margin:w.score-l.score});
    });
    if(records.length){
      var bestRound=Math.max.apply(null,records.map(function(r){return r.roundNum;}));
      var topRecords=records.filter(function(r){return r.roundNum===bestRound;});
      if(topRecords.length===1){
        seed15Data=topRecords[0]; seed15Winners=[topRecords[0].team.owner]; seed15Teams=[topRecords[0].team.name];
      } else {
        /* Same round — tiebreaker: smallest loss margin IN that specific round */
        var bestMargin=Math.min.apply(null,topRecords.map(function(r){return r.margin;}));
        var finalists=topRecords.filter(function(r){return r.margin===bestMargin;});
        seed15Data=finalists[0];
        finalists.forEach(function(r){ seed15Winners.push(r.team.owner); seed15Teams.push(r.team.name); });
      }
    }
  }

  /* ── CONFIRMED overrides: loss + seed15 are done — always enforce, ignore ESPN ── */
  if(SIDE_POT_MANUAL.lossTeam){
    var lt=TEAMS.find(function(t){return t.name===SIDE_POT_MANUAL.lossTeam;});
    if(lt){ lossTeams=[lt.name]; lossWinners=[lt.owner]; }
  }
  if(SIDE_POT_MANUAL.seed15Team){
    var st=TEAMS.find(function(t){return t.name===SIDE_POT_MANUAL.seed15Team;});
    if(st){ seed15Teams=[st.name]; seed15Winners=[st.owner]; }
  }
  /* ── Upset: moving target — manual is floor, ESPN wins if it finds a bigger upset ── */
  if(SIDE_POT_MANUAL.upsetTeam){
    var manDiff=SIDE_POT_MANUAL.upsetDiff||0;
    if(manDiff>=bupsetDiff){
      var ut=TEAMS.find(function(t){return t.name===SIDE_POT_MANUAL.upsetTeam;});
      if(ut){ upsetTeams=[ut.name]; upsetWinners=[ut.owner]; bupsetDiff=manDiff; }
    }
  }

  var sp = {
    /* winner arrays (length > 1 = split pot) */
    lossWinners:lossWinners,   lossTeams:lossTeams,   lossConfirmed:lossWinners.length>0,
    upsetWinners:upsetWinners, upsetTeams:upsetTeams,
    seed15Winners:seed15Winners, seed15Teams:seed15Teams, seed15Confirmed:seed15Winners.length>0,

    /* raw data for payouts display */
    blossEntries:blossEntries,  blossMargin:blossMargin,
    bupsetEntries:bupsetEntries, bupsetDiff:bupsetDiff,
    seed15Data:seed15Data,

    alive1516:alive1516, r64Done:r64Done, all1516Done:all1516Done
  };
  _sidePotCache=sp;
  return sp;
}
function clearSidePotCache(){ _sidePotCache=null; }

function ownerEarned(oid) {
  var total=0;
  /* R1 (R64 winners, seeds 8-16) */
  var r1pp=getR1PerTeam();
  TEAMS.forEach(function(t){ if(t.owner===oid && t.r1eligible && t.wonR1) total+=r1pp; });
  /* S16 (seeds 4-16 that won R32) */
  var s16pp=computeS16PerTeam();
  TEAMS.forEach(function(t){ if(t.owner===oid && t.seed>=4 && t.wonR32) total+=s16pp; });
  /* E8 (seeds 1-3 that won S16) */
  var e8pp=computeE8PerTeam();
  TEAMS.forEach(function(t){ if(t.owner===oid && t.top3 && t.wonS16) total+=e8pp; });
  /* F4 (fixed per team — won E8) */
  TEAMS.forEach(function(t){ if(t.owner===oid && t.wonE8) total+=POTS.f4; });
  /* Finals appearance (fixed per team — won F4) */
  TEAMS.forEach(function(t){ if(t.owner===oid && t.wonF4) total+=POTS.finals; });
  /* Champion (winner takes all) */
  TEAMS.forEach(function(t){ if(t.owner===oid && t.wonNCG) total+=POTS.champ; });
  /* Side pots */
  var sp=computeSidePots();
  if(sp.lossConfirmed   && sp.lossWinners.indexOf(oid)>-1)  total += Math.round(POTS.loss/sp.lossWinners.length);
  if(sp.upsetWinners.length && sp.upsetWinners.indexOf(oid)>-1) total += Math.round(POTS.upset/sp.upsetWinners.length);
  if(sp.seed15Confirmed && sp.seed15Winners.indexOf(oid)>-1) total += Math.round(POTS.seed15/sp.seed15Winners.length);
  return total;
}

function ownerNet(oid) { return ownerEarned(oid)-OWNERS[oid].paid; }

/* ═══════════════════════════════════════════════════════
   ESPN LIVE DATA
═══════════════════════════════════════════════════════ */

var liveGames=[], completedGames=[], upcomingGames=[];
var knownRoundDates={}; /* date → round string, e.g. '2026-03-22' → 'R32' */

function espnNameMatch(n) {
  n=(n||'').toLowerCase().trim();
  for(var i=0;i<TEAMS.length;i++){
    var t=TEAMS[i];
    for(var j=0;j<t.espn.length;j++){ if(n===t.espn[j]) return t; }
  }
  return null;
}

function toETDate(iso) {
  try {
    var d=new Date(iso);
    var s=d.toLocaleDateString('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit'});
    var p=s.split('/');
    return p[2]+'-'+p[0]+'-'+p[1];
  } catch(e){ return ''; }
}

function getGameRound(ev, teams) {
  var comp=ev.competitions&&ev.competitions[0];
  if(comp&&comp.notes&&comp.notes.length){
    var hl=(comp.notes[0].headline||'').toLowerCase();
    /* IMPORTANT: check specific rounds BEFORE generic "championship" keyword,
       because ESPN prepends "NCAA ... Championship -" to every round headline */
    var d=toETDate(ev.date||'');
    if(hl.indexOf('first round')>-1||hl.indexOf('1st round')>-1||hl.indexOf('round of 64')>-1){
      if(d) knownRoundDates[d]='R64'; return 'R64';
    }
    if(hl.indexOf('second round')>-1||hl.indexOf('2nd round')>-1||hl.indexOf('round of 32')>-1){
      if(d) knownRoundDates[d]='R32'; return 'R32';
    }
    if(hl.indexOf('sweet')>-1)  { if(d) knownRoundDates[d]='S16'; return 'S16'; }
    if(hl.indexOf('elite')>-1)  { if(d) knownRoundDates[d]='E8';  return 'E8';  }
    if(hl.indexOf('final four')>-1||hl.indexOf('semifinal')>-1){ if(d) knownRoundDates[d]='F4'; return 'F4'; }
    if(hl.indexOf('national championship')>-1||hl.indexOf('championship game')>-1){ if(d) knownRoundDates[d]='NCG'; return 'NCG'; }
  }
  if(teams){
    var matched=teams.filter(function(t){return t.matched;});
    if(matched.length>=2&&matched.every(function(t){return t.matched.status==='won';})){
      var d2=toETDate(ev.date||''); if(d2) knownRoundDates[d2]='R32'; return 'R32';
    }
  }
  return 'R64';
}

function processESPN(data) {
  if(!data||!data.events) return;
  liveGames=[]; completedGames=[]; upcomingGames=[]; clearSidePotCache();

  data.events.forEach(function(ev){
    if(!ev.competitions||!ev.competitions[0]) return;
    var comp=ev.competitions[0];
    var comps=comp.competitors;
    if(!comps||comps.length<2) return;

    var state=comp.status&&comp.status.type?comp.status.type.state:'pre';
    var detail=comp.status&&comp.status.type?comp.status.type.shortDetail:'';
    var clock =comp.status&&comp.status.displayClock?comp.status.displayClock:'';
    var period=comp.status&&comp.status.period?comp.status.period:0;
    var periodLabel=period===1?'1ST':period===2?'2ND':period===3?'OT':period>3?'OT'+( period-2):'';
    var isHalftime = comp.status&&comp.status.type&&comp.status.type.name==='STATUS_HALFTIME';
    var liveDetail = isHalftime
      ? 'HT · 0:00'
      : (clock&&periodLabel ? clock+' · '+periodLabel : detail);

    var teams=comps.map(function(c){
      var nm=c.team?(c.team.shortDisplayName||c.team.displayName||''):'';
      var nmAlt=c.team?(c.team.displayName||''):'';
      var matched=espnNameMatch(nm)||espnNameMatch(nmAlt);
      var sc=parseInt(c.score||'0',10)||0;
      var winner=c.winner===true;
      var logoUrl='';
      if(c.team){
        if(c.team.id) logoUrl='https://a.espncdn.com/i/teamlogos/ncaa/500/'+c.team.id+'.png';
        else if(c.team.logo) logoUrl=c.team.logo;
      }
      return {espnName:nm,matched:matched,score:sc,winner:winner,logoUrl:logoUrl};
    });

    var gameRound=getGameRound(ev,teams);

    /* Update team status from ESPN */
    teams.forEach(function(t){
      if(!t.matched) return;
      if(state==='in'){
        t.matched.status='live';
      } else if(state==='post'){
        if(t.winner){
          if(gameRound==='R64'&&t.matched.r1eligible&&PLAYIN_TEAMS.indexOf(t.matched.name)===-1) t.matched.wonR1=true;
          if(gameRound==='R32') t.matched.wonR32=true;
          if(gameRound==='S16') t.matched.wonS16=true;
          if(gameRound==='E8')  t.matched.wonE8=true;
          if(gameRound==='F4')  t.matched.wonF4=true;
          if(gameRound==='NCG') t.matched.wonNCG=true;
          t.matched.status='won';
        } else {
          t.matched.status='lost';
        }
      }
      if(t.logoUrl) t.matched.logo=t.logoUrl;
    });

    var g={t1:teams[0],t2:teams[1],round:gameRound,detail:state==='in'?liveDetail:detail,date:toETDate(ev.date||''),evDate:ev.date||''};
    if(state==='in')        liveGames.push(g);
    else if(state==='post') completedGames.push(g);
    else                    upcomingGames.push(g);
  });

  renderAll();
}

var ROUND_LABELS = {R64:'ROUND OF 64',R32:'ROUND OF 32',S16:'SWEET 16',E8:'ELITE 8',F4:'FINAL FOUR',NCG:'CHAMPIONSHIP'};
function dateSectionLabel(ymd) {
  if(!ymd) return 'UPCOMING';
  var r=knownRoundDates[ymd];
  if(r) return (ROUND_LABELS[r]||r)+' · '+fmtDate(ymd);
  return 'ROUND OF 64 · '+fmtDate(ymd);
}

function fmtDate(ymd) {
  if(!ymd) return '';
  var months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var parts=ymd.split('-');
  return months[parseInt(parts[1],10)-1]+' '+parseInt(parts[2],10);
}

function startPolling() {
  function fetchAll() {
    /* Fetch past 5 days (covers full R64+R32) and next 7 days (covers upcoming S16/E8) */
    var dates=[];
    for(var offset=-5;offset<=7;offset++){
      var d=toETDate(new Date(Date.now()+offset*86400000).toISOString());
      if(d&&dates.indexOf(d)===-1) dates.push(d);
    }
    Promise.all(dates.map(function(d){
      return fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates='+d.replace(/-/g,'')+'&_t='+Date.now(), {cache:'no-store'})
        .then(function(r){return r.json();}).catch(function(){return null;});
    })).then(function(results){
      var merged={events:[]};
      results.forEach(function(r){
        if(r&&r.events) merged.events=merged.events.concat(r.events);
      });
      processESPN(merged);
      showSplash(); /* fire after first real data load */
    });
  }
  fetchAll();
  /* Poll every 20s — cache-busting param ensures fresh ESPN data each hit */
  setInterval(fetchAll, 20000);
}

function logoImg(t, size, radius) {
  size = size||36; radius = radius||9;
  var src = (t&&t.logo)||LOGOS[t&&t.name]||'';
  if(src) return '<img src="'+src+'" style="width:'+size+'px;height:'+size+'px;border-radius:'+radius+'px;object-fit:contain;background:#eeeef6;flex-shrink:0" onerror="this.style.display=\'none\'">';
  var seed = t?t.seed:'?';
  return '<div style="width:'+size+'px;height:'+size+'px;border-radius:'+radius+'px;background:#eeeef6;display:flex;align-items:center;justify-content:center;font-size:'+(size>30?11:8)+'px;font-weight:800;color:#34344a;flex-shrink:0">'+(seed||'?')+'</div>';
}

function ownerTag(oid, size) {
  var o=OWNERS[oid]; if(!o) return '';
  size=size||8;
  return '<span style="background:'+o.color+';color:#000;font-size:'+size+'px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:.2px">'+o.name+'</span>';
}

function toggleScoring(oid) {
  var wrap = document.getElementById('sb-'+oid);
  var btn  = document.getElementById('sbt-'+oid);
  if(!wrap||!btn) return;
  wrap.classList.toggle('open');
  btn.classList.toggle('open');
}


/* Human-readable advancement label */
function teamAdvLabel(t) {
  if(t.wonNCG) return 'Champion';
  if(t.wonF4)  return 'In Finals';
  if(t.wonE8)  return 'In Final Four';
  if(t.wonS16) return 'In Elite 8';
  if(t.wonR32) return 'In Sweet 16';
  if(t.wonR1)  return 'In Round of 32';
  return 'In Round of 64';
}


function buildScoringBreakdown(oid) {
  var r1pp  = getR1PerTeam();
  var s16pp = computeS16PerTeam();
  var e8pp  = computeE8PerTeam();
  var sp    = computeSidePots();
  var myTeams = TEAMS.filter(function(t){ return t.owner===oid; })
    .sort(function(a,b){ return a.seed-b.seed; });

  var hasS16Earned = myTeams.some(function(t){ return t.seed>=4 && t.wonR32; });
  var _cr = getCurrentRound();
  var _r32Done = (_cr==='S16'||_cr==='E8'||_cr==='F4'||_cr==='NCG');
  var hasVariableS16 = hasS16Earned && !_r32Done && getS16Winners().length < 16;

  /* Build per-team rows — confirmed earnings only */
  var teamRows = myTeams.map(function(t) {
    var rows = [];
    if(t.r1eligible && t.wonR1)  rows.push({pot:'R1',     desc:'Won R64 · Advancing to R32',         amt:'+$'+c(r1pp)});
    if(t.seed>=4   && t.wonR32)  rows.push({pot:'S16',    desc:'Won R32 · Advancing to Sweet Sixteen', amt:'+$'+c(s16pp)+(hasVariableS16?'*':'')});
    if(t.top3      && t.wonS16)  rows.push({pot:'E8',     desc:'Won S16 · Advancing to Elite 8',     amt:'+$'+c(e8pp)});
    if(t.wonE8)                  rows.push({pot:'F4',     desc:'Won E8 · Advancing to Final Four',   amt:'+$'+c(POTS.f4)});
    if(t.wonF4)                  rows.push({pot:'Finals', desc:'Won F4 · Advancing to Finals',       amt:'+$'+c(POTS.finals)});
    if(t.wonNCG)                 rows.push({pot:'Champ',  desc:'Won Championship',                   amt:'+$'+c(POTS.champ)});
    if(rows.length === 0) return '';

    var logoSrc = t.logo||LOGOS[t.name]||'';
    var logoHtml = logoSrc
      ? '<img src="'+logoSrc+'" class="sb-thdr-logo" onerror="this.style.display=\'none\'">'
      : '<div class="sb-thdr-logo-fb">'+t.seed+'</div>';
    var nm = t.name.replace('Saint ','St. ').replace('Northern ','N. ').replace(' State',' St.');

    return '<div class="sb-team">'
      + '<div class="sb-thdr">'+logoHtml+'<span class="sb-thdr-name"><span class="sb-thdr-seed">#'+t.seed+' </span>'+nm+'</span></div>'
      + rows.map(function(r){
          return '<div class="sb-row earned">'
            + '<span class="sb-desc">'+r.desc+'</span>'
            + '<span class="sb-amt">'+r.amt+'</span>'
          + '</div>';
        }).join('')
    + '</div>';
  }).join('');

  /* Side pots */
  var spHtml = '';
  var ownsLoss  = sp.lossConfirmed    && sp.lossWinners.indexOf(oid)>-1;
  var ownsUpset = sp.upsetWinners.length && sp.upsetWinners.indexOf(oid)>-1;
  var owns1516  = sp.seed15Confirmed  && sp.seed15Winners.indexOf(oid)>-1;
  if(ownsLoss||ownsUpset||owns1516) {
    spHtml += '<hr class="sb-divider"><div class="sb-sidepot-hdr">Side Pots</div>';
    if(ownsLoss)  spHtml += '<div class="sb-sidepot-row"><span class="sb-sidepot-icon">📉</span><span class="sb-sidepot-desc">Biggest Loss — '+sp.lossTeams.join(', ')+'</span><span class="sb-sidepot-amt">+$'+c(Math.round(POTS.loss/sp.lossWinners.length))+'</span></div>';
    if(ownsUpset) spHtml += '<div class="sb-sidepot-row"><span class="sb-sidepot-icon">⚡</span><span class="sb-sidepot-desc">Biggest Upset — '+sp.upsetTeams.join(', ')+'</span><span class="sb-sidepot-amt">+$'+c(Math.round(POTS.upset/sp.upsetWinners.length))+'</span></div>';
    if(owns1516)  spHtml += '<div class="sb-sidepot-row"><span class="sb-sidepot-icon">🏅</span><span class="sb-sidepot-desc">Best 15/16 — '+sp.seed15Teams.join(', ')+'</span><span class="sb-sidepot-amt">+$'+c(Math.round(POTS.seed15/sp.seed15Winners.length))+'</span></div>';
  }

  var hasAnyEarnings = teamRows.trim()!==''||ownsLoss||ownsUpset||owns1516;
  if(!hasAnyEarnings) {
    return '<div class="sb-wrap" id="sb-'+oid+'"><div style="font-size:10px;color:#2e2e45;text-align:center;padding:4px 0">No confirmed earnings yet</div></div>';
  }

  var footnote = hasVariableS16
    ? '<div class="sb-footnote">* S16 rate pending R32 completion</div>'
    : '';

  return '<div class="sb-wrap" id="sb-'+oid+'">'
    + teamRows + spHtml + footnote
  + '</div>';
}

function renderTeams() {
  var el    = document.getElementById('owner-list');
  var label = document.getElementById('teams-label');
  if(!el) return;

  var r1pp = getR1PerTeam();

  /* Sort owners by net P&L descending */
  var ownerIds = Object.keys(OWNERS).sort(function(a,b){ return ownerNet(b)-ownerNet(a); });

  var aliveTotal = TEAMS.filter(function(t){ return t.status!=='lost'; }).length;
  label.textContent = aliveTotal+' Teams Alive · '+ownerIds.length+' Owners';

  el.innerHTML = ownerIds.map(function(oid){
    var o       = OWNERS[oid];
    var earned  = ownerEarned(oid);
    var net     = ownerNet(oid);
    var netStr  = (net>=0?'+$':'-$')+c(Math.abs(net));
    var netCls  = net>=0?'ocard-net pos':'ocard-net';
    var hasLive = TEAMS.some(function(t){ return t.owner===oid && t.status==='live'; });

    /* Split earned into team R1 earnings vs side bet earnings */
    var r1pp = getR1PerTeam();
    var teamEarnedAmt = 0;
    TEAMS.forEach(function(t){ if(t.owner===oid && t.r1eligible && t.wonR1) teamEarnedAmt += r1pp; });
    var spEarn = computeSidePots();
    var sideBetAmt = 0;
    if(spEarn.lossConfirmed    && spEarn.lossWinners.indexOf(oid)>-1)   sideBetAmt += POTS.loss/spEarn.lossWinners.length;
    if(spEarn.upsetWinners.length && spEarn.upsetWinners.indexOf(oid)>-1) sideBetAmt += POTS.upset/spEarn.upsetWinners.length;
    if(spEarn.seed15Confirmed  && spEarn.seed15Winners.indexOf(oid)>-1) sideBetAmt += POTS.seed15/spEarn.seed15Winners.length;

    /* Sort teams: live → earned → alive → lost */
    var myTeams = TEAMS.filter(function(t){ return t.owner===oid; })
      .sort(function(a,b){
        function pri(t){
          if(t.status==='live')            return 0;
          if(t.wonR1 && t.r1eligible)      return 1;
          if(t.status==='won'||t.status==='alive') return 2+t.seed;
          return 100+t.seed; /* lost last */
        }
        return pri(a)-pri(b);
      });

    var aliveCount = myTeams.filter(function(t){ return t.status!=='lost'; }).length;

    var sp = computeSidePots();

    /* Separate alive vs lost */
    var aliveTeams = myTeams.filter(function(t){ return t.status!=='lost'; });
    var lostTeams  = myTeams.filter(function(t){ return t.status==='lost'; });

    function shortName(t) {
      var nm = t.name.replace('Saint ','St. ').replace('Northern ','N. ').replace(' State',' St.');
      return nm.length>12 ? nm.substring(0,11)+'…' : nm;
    }

    /* ── Alive chips ── */
    var aliveChips = aliveTeams.map(function(t){
      var isLive       = t.status==='live';
      var hasEarned    = t.wonR1 && t.r1eligible;
      var isBigLoss    = sp.lossTeams   && sp.lossTeams.indexOf(t.name)>-1;
      var isUpsetLeader= sp.upsetTeams  && sp.upsetTeams.indexOf(t.name)>-1;
      var is1516Win    = sp.seed15Teams && sp.seed15Teams.indexOf(t.name)>-1;
      var hasSidePot   = isBigLoss||isUpsetLeader||is1516Win;
      var chipCls      = 'tchip'+(isLive?' live':hasEarned?' earned':'')+(hasSidePot?' sp-winner':'');
      var logoSrc      = t.logo||LOGOS[t.name]||'';
      var logoHtml = logoSrc
        ? '<img src="'+logoSrc+'" class="tchip-logo" onerror="this.style.display=\'none\'">'
        : '<div class="tchip-logo-fb">'+t.seed+'</div>';
      var earnSpan = hasEarned ? '<span class="tchip-earn">+$'+c(getR1PerTeam())+' R1</span>' : '';
      var spIcons  = (isUpsetLeader?'<span class="tchip-sp-icon">⚡</span>':'')
                   + (isBigLoss    ?'<span class="tchip-sp-icon">📉</span>':'')
                   + (is1516Win    ?'<span class="tchip-sp-icon">🏅</span>':'');
      var liveDot  = isLive ? '<div class="tchip-live-dot"></div>' : '';
      return '<div class="'+chipCls+'">'
        + logoHtml
        + '<span class="tchip-label"><span class="tchip-seed">#'+t.seed+' </span>'+shortName(t)+'</span>'
        + earnSpan + spIcons + liveDot
        + '</div>';
    }).join('');

    /* ── Lost — plain comma-separated text line ──
       Longer name budget than alive chips; side pot icons sit AFTER
       the separator so they never attach to a truncated name.
       Earned teams get a dim green tint to denote prior earnings. */
    var lostRow = lostTeams.length
      ? '<div class="ocard-lost-row"><span class="ocard-lost-lbl">Lost</span>'
          + lostTeams.map(function(t){
              var isBigLoss    = sp.lossTeams   && sp.lossTeams.indexOf(t.name)>-1;
              var isUpsetLeader= sp.upsetTeams  && sp.upsetTeams.indexOf(t.name)>-1;
              var is1516Win    = sp.seed15Teams && sp.seed15Teams.indexOf(t.name)>-1;
              var hasSidePot   = isBigLoss||isUpsetLeader||is1516Win;
              var hadEarned    = t.r1eligible && t.wonR1;
              /* Full name, no truncation in lost row — it's plain text with more room */
              var nm = t.name.replace('Saint ','St. ').replace('Northern ','N. ').replace(' State',' St.');
              var icon = hasSidePot ? (isUpsetLeader?'⚡':isBigLoss?'📉':'🏅') : '';
              var cls  = hasSidePot ? 'ocard-lost-sp' : hadEarned ? 'ocard-lost-earned' : '';
              return '<span'+(cls?' class="'+cls+'"':'')+'>#'+t.seed+' '+nm+(icon?' '+icon:'')+'</span>';
            }).join('<span class="ocard-lost-sep"> · </span>')
        + '</div>'
      : '';

    var ownsLossT  = sp.lossWinners   && sp.lossWinners.indexOf(oid)>-1;
    var ownsUpsetT = sp.upsetWinners  && sp.upsetWinners.indexOf(oid)>-1;
    var owns1516T  = sp.seed15Winners && sp.seed15Winners.indexOf(oid)>-1;
    var spPills = (ownsUpsetT ? '<span class="ocard-sp-pill upset">⚡ Biggest Upset · +$'+c(POTS.upset/sp.upsetWinners.length)+'</span>'  : '')
                + (ownsLossT  ? '<span class="ocard-sp-pill loss">📉 Biggest Loss · +$'+c(POTS.loss/sp.lossWinners.length)+'</span>'    : '')
                + (owns1516T  ? '<span class="ocard-sp-pill seed15">🏅 Best 15/16 Seed · +$'+c(POTS.seed15/sp.seed15Winners.length)+'</span>' : '');

    var netStr = (net>=0?'+$':'-$')+c(Math.abs(net));
    var earnedStr = earned>0 ? '<b style="color:var(--oc)">+$'+c(earned)+'</b> earned · ' : '';
    return '<div class="ocard'+(hasLive?' has-live':'')+'" style="--oc:'+o.color+'">'
      + '<div class="ocard-hdr">'
        + '<div class="ocard-name">'+o.name+'</div>'
        + '<span class="ocard-hdr-sep">·</span>'
        + '<span class="ocard-hdr-meta">'+aliveCount+' remaining</span>'
        + '<span class="ocard-hdr-sep">·</span>'
        + '<span class="ocard-hdr-meta">'+earnedStr+'<b>$'+c(o.paid)+'</b> spent</span>'
        + '<div class="ocard-hdr-right">'
          + '<span style="font-size:13px;font-weight:800;color:var(--oc);white-space:nowrap">'+netStr+'</span>'
        + '</div>'
      + '</div>'
      + (spPills ? '<div style="display:flex;flex-wrap:wrap;gap:3px;padding:0 11px 5px">'+spPills+'</div>' : '')
      + '<div class="ocard-teams">'
        + '<div class="ocard-alive-row">'+aliveChips+'</div>'
        + lostRow
      + '</div>'
      + '<button class="sb-toggle" id="sbt-'+oid+'" onclick="toggleScoring(\''+oid+'\')">'
        + 'Scoring <i class="sb-chevron">▾</i>'
      + '</button>'
      + buildScoringBreakdown(oid)
    + '</div>';
  }).join('');
}

/* ═══════════════════════════════════════════════════════
   RENDER — GAMES (full-width matchup cards)

function renderGames() {
  var el = document.getElementById('games-content');
  if(!el) return;

  var html = '';
  var r1pp  = getR1PerTeam();
  /* Use projected S16 rate (all seeds 4+ still alive ÷ POTS.s16),
     same formula as standings — avoids inflation from early partial winners */
  var _s16Eligible = TEAMS.filter(function(t){ return t.seed>=4 && t.status!=='lost'; });
  var s16pp = _s16Eligible.length>0 ? Math.ceil(POTS.s16/Math.min(_s16Eligible.length,16)) : 0;

  /* Build one team side column */
  function teamCol(t, round, isDone, side) {
    var tm = t.matched;
    var isWinner = isDone && t.winner;
    var isLoser  = isDone && !t.winner;
    var nameCls  = 'mcard-tname'+(isWinner?' winner':isLoser?' loser':'');
    var logoSrc  = (tm&&tm.logo)||LOGOS[tm&&tm.name]||'';
    var logoHtml = logoSrc
      ? '<img src="'+logoSrc+'" class="mcard-logo" onerror="this.style.display=\'none\'">'
      : '<div class="mcard-logo-fb">'+(tm?tm.seed:'?')+'</div>';
    var nm = tm ? tm.name : (t.espnName||'TBD');
    if(nm.length>13) nm = nm.replace('Saint ','St. ').replace('Northern ','N. ').replace(' State',' St.');
    var ownHtml = tm ? ownerTag(tm.owner,8) : '';

    /* earn badge inline — only for upcoming/live */
    var earn = '';
    if(!isDone && tm) {
      if(round==='R64' && tm.r1eligible && !tm.wonR1 && r1pp>0)
        earn = '<div class="mcard-earn r1">+$'+c(r1pp)+' R1</div>';
      if(round==='R32' && tm.seed>=4 && s16pp>0)
        earn = '<div class="mcard-earn s16">+$'+c(s16pp)+' S16<span style="opacity:.5;font-size:.85em">*</span></div>';
      if(round==='S16' && tm.top3) {
        var e8pp=computeE8PerTeam();
        if(e8pp>0) earn = '<div class="mcard-earn s16">+$'+c(e8pp)+' E8</div>';
      }
      if(round==='E8')
        earn = '<div class="mcard-earn s16">+$'+c(POTS.f4)+' F4</div>';
      if(round==='F4')
        earn = '<div class="mcard-earn s16">+$'+c(POTS.finals+POTS.champ)+' Finals</div>';
    }

    return '<div class="mcard-side'+(side==='right'?' right':'')+'">'
      + logoHtml
      + '<div class="mcard-info">'
        + '<div class="'+nameCls+'">'+nm+'</div>'
        + '<div class="mcard-meta">'
          + (tm?'<span class="mcard-seed">#'+tm.seed+'</span>':'')
          + ownHtml
        + '</div>'
        + earn
      + '</div>'
    + '</div>';
  }

  /* Center column */
  function midLive(t1, t2, detail) {
    return '<div class="mcard-mid">'
      + '<div class="mcard-scores"><span class="mcard-sc">'+t1.score+'</span>'
      + '<span class="mcard-sc-sep">–</span>'
      + '<span class="mcard-sc">'+t2.score+'</span></div>'
      + (detail ? '<div class="mcard-status">'+detail+'</div>' : '')
    + '</div>';
  }
  function midVs() {
    return '<div class="mcard-mid"><div class="mcard-vs">VS</div></div>';
  }
  function midFinal(t1, t2) {
    return '<div class="mcard-mid">'
      + '<div class="mcard-scores">'
      + '<span class="mcard-sc'+(t1.winner?' win':' lose')+'">'+t1.score+'</span>'
      + '<span class="mcard-sc-sep">–</span>'
      + '<span class="mcard-sc'+(t2.winner?' win':' lose')+'">'+t2.score+'</span>'
      + '</div>'
      + '<div class="mcard-status">FINAL</div>'
    + '</div>';
  }

  /* Upset eligibility banner — shown on upcoming/live games where underdog win
     would beat or tie the current Biggest Upset leader seed diff               */
  function upsetBannerHtml(g) {
    var tm1 = g.t1.matched, tm2 = g.t2.matched;
    if(!tm1 || !tm2) return '';
    var diff = Math.abs(tm1.seed - tm2.seed);
    if(diff < 2) return ''; /* same-seed matchup or 1-diff — not interesting */
    var sp = computeSidePots();
    var leader = sp.bupsetDiff;
    var leaderOwner = sp.upsetWinners.length ? (OWNERS[sp.upsetWinners[0]]||{name:sp.upsetWinners[0]}).name : 'TBD';
    /* identify underdog (higher seed number) and favorite */
    var underdog = tm1.seed > tm2.seed ? tm1 : tm2;
    var fav      = tm1.seed > tm2.seed ? tm2 : tm1;
    var matchup  = '#'+underdog.seed+' over #'+fav.seed;
    if(diff > leader) {
      return '<div class="upset-banner beats">⚡ +'+diff+' differential — beats upset leader '+leaderOwner+'</div>';
    } else if(diff === leader) {
      return '<div class="upset-banner ties">⚡ +'+diff+' differential — ties upset leader '+leaderOwner+'</div>';
    }
    return '';
  }

  var _gcr = getCurrentRound();
  var _gr32Done = (_gcr==='S16'||_gcr==='E8'||_gcr==='F4'||_gcr==='NCG');
  var s16NoteHtml = (!_gr32Done && s16pp>0) ? '<span style="margin-left:auto;display:inline-block;text-align:right;font-weight:500;letter-spacing:.2px;text-transform:none;font-size:9px;line-height:1.5;color:#7070aa;background:rgba(112,112,170,.1);border:1px solid rgba(112,112,170,.2);border-radius:6px;padding:2px 7px">* S16 rate pending R32</span>' : '';
  var s16NoteShown = false; /* only show once — in the first R32 section */

  /* E8 banner — show at top of games page whenever E8 is the active round */
  if(_gcr==='E8') {
    html += '<div class="e8-live-banner" style="margin-bottom:12px"><span class="live-dot"></span>E8 Games Live. Final 4 Payouts Are Fixed</div>';
  }

  /* LIVE */
  if(liveGames.length) {
    var liveHasR32 = liveGames.some(function(g){return g.round==='R32';});
    var liveNote = (liveHasR32 && !s16NoteShown) ? (s16NoteShown=true, s16NoteHtml) : '';
    html += '<div class="games-section"><div class="game-list">';
    liveGames.forEach(function(g){
      var t1=g.t1, t2=g.t2;
      html += '<div class="mcard live">'
        + '<div class="mcard-top"><div class="mcard-top-left"><span class="mcard-round">'+g.round+'</span></div><div class="mcard-top-right" style="display:flex;align-items:center;gap:4px"><span class="live-dot"></span>LIVE</div></div>'
        + upsetBannerHtml(g)
        + '<div class="mcard-body">'
          + teamCol(t1,g.round,false,'left')
          + midLive(t1,t2,g.detail)
          + teamCol(t2,g.round,false,'right')
        + '</div>'
      + '</div>';
    });
    html += '</div></div>';
  }

  /* UPCOMING — grouped by date */
  if(upcomingGames.length) {
    var byDate={};
    upcomingGames.forEach(function(g){
      var d=g.date||'unknown'; if(!byDate[d]) byDate[d]=[];
      byDate[d].push(g);
    });
    Object.keys(byDate).sort().forEach(function(d){
      var lbl = d==='unknown'?'UPCOMING':dateSectionLabel(d);
      var isR32Date = knownRoundDates[d]==='R32';
      var dateNote = (isR32Date && !s16NoteShown) ? (s16NoteShown=true, s16NoteHtml) : '';
      html += '<div class="games-section"><div class="games-sec-hdr">'+lbl+dateNote+'</div><div class="game-list">';
      byDate[d].forEach(function(g){
        var t1=g.t1,t2=g.t2;
        html += '<div class="mcard">'
          + '<div class="mcard-top"><div class="mcard-top-left"><span class="mcard-round">'+g.round+'</span></div><div class="mcard-top-right">'+(g.detail||'TBD')+'</div></div>'
          + upsetBannerHtml(g)
          + '<div class="mcard-body">'
            + teamCol(t1,g.round,false,'left')
            + midVs()
            + teamCol(t2,g.round,false,'right')
          + '</div>'
        + '</div>';
      });
      html += '</div></div>';
    });
  }

  /* COMPLETED */
  if(completedGames.length) {
    var cByDate={};
    completedGames.forEach(function(g){
      var d=g.date||'unknown'; if(!cByDate[d]) cByDate[d]=[];
      cByDate[d].push(g);
    });
    Object.keys(cByDate).sort().reverse().forEach(function(d){
      var lbl = d==='unknown'?'COMPLETED':dateSectionLabel(d);
      var w1; /* winner name for header */
      html += '<div class="games-section"><div class="games-sec-hdr">'+lbl+' · FINAL</div><div class="game-list">';
      cByDate[d].forEach(function(g){
        var t1=g.t1,t2=g.t2;
        var w=t1.winner?t1:t2;
        html += '<div class="mcard final">'
          + '<div class="mcard-top">'
            + '<div class="mcard-top-left"><span class="mcard-round">'+g.round+'</span></div>'
            + '<div class="mcard-top-right" style="color:#22c55e;font-weight:700">'+(w.matched?w.matched.name:w.espnName||'')+'</div>'
          + '</div>'
          + '<div class="mcard-body">'
            + teamCol(t1,g.round,true,'left')
            + midFinal(t1,t2)
            + teamCol(t2,g.round,true,'right')
          + '</div>'
        + '</div>';
      });
      html += '</div></div>';
    });
  }

  if(!html) html='<div style="text-align:center;color:#2e2e44;font-size:12px;padding:40px 0;font-style:italic">Loading games…</div>';
  el.innerHTML = html;
}

function bktFindGame(n1, n2) {
  var all=completedGames.concat(liveGames,upcomingGames);
  for(var i=0;i<all.length;i++){
    var g=all[i];
    var a=(g.t1.matched&&g.t1.matched.name)||'';

  return null;
}

/* Who won E8/F4 in a given region (reg display name like 'East','Midwest') */
function bktRegAdv(regName, flag) {
  var r=regName==='Midwest'?'MW':regName;
  return TEAMS.find(function(t){ return t.region===r&&t[flag]; })||null;
}

function bktOwnerCap(oid) {
  var o=OWNERS[oid]; if(!o) return '';
  return '<span style="background:'+o.color+';color:#000;font-size:7px;font-weight:800;padding:1px 4px;border-radius:20px;letter-spacing:.2px;white-space:nowrap;flex-shrink:0">'+o.name+'</span>';
}

/* One team row inside a game card.
   round: 'S16'|'E8'|'F4'|'NCG' — determines which win flag to check */
function bktRow(teamName, roundFlag, opponentName, sc, live) {
  var t=bktTeam(teamName); if(!t) return '';
  var opp=bktTeam(opponentName);
  var oc=OWNERS[t.owner]?OWNERS[t.owner].color:'';
  var logo=t.logo||LOGOS[t.name]||'';
  var logoHtml=logo
    ?'<img src="'+logo+'" style="width:18px;height:18px;border-radius:3px;object-fit:contain;flex-shrink:0" onerror="this.style.display=\'none\'">'
    :'<div style="width:18px;height:18px;border-radius:3px;background:#eeeef6;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#444;flex-shrink:0">'+t.seed+'</div>';
  /* Determine win/loss from the round-specific flag — prevents cross-round false positives */
  var isWin=!!(t[roundFlag]);
  var isLos=!!(opp&&opp[roundFlag]);
  var nameColor=isLos?'#2a2a3a':isWin?'#fff':'#8888a8';
  var decor=isLos?';text-decoration:line-through':'';
  var scoreColor=live?'#f59e0b':isWin?'#fff':'#2a2a3a';
  var scoreHtml=(isWin||isLos||live)&&sc!=null
    ?'<span style="font-family:monospace;font-size:11px;font-weight:800;color:'+scoreColor+';flex-shrink:0;margin-left:2px">'+sc+'</span>'
    :'';
  return '<div style="display:flex;align-items:center;gap:6px;padding:4px 8px 4px '+(oc?'11px':'8px')+';position:relative;min-height:26px">'
    +(oc?'<span style="position:absolute;left:0;top:3px;bottom:3px;width:3px;background:'+oc+';border-radius:2px"></span>':'')
    +logoHtml
    +'<span style="font-size:9px;color:#4a4a6a;flex-shrink:0;width:14px;text-align:right">'+t.seed+'</span>'
    +'<span style="flex:1;font-size:12px;font-weight:'+(isWin?700:400)+';color:'+nameColor+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap'+decor+'">'+t.name+'</span>'
    +bktOwnerCap(t.owner)
    +scoreHtml
    +'</div>';
}

/* Game card for a matchup.
   round: 'S16'|'E8'|'F4'|'NCG' — scopes win/loss flag */
function bktCard(n1, n2, round) {
  var flagMap={S16:'wonS16',E8:'wonE8',F4:'wonF4',NCG:'wonNCG'};
  var flag=flagMap[round]||'wonS16';
  var t1=bktTeam(n1), t2=bktTeam(n2);
  var sc1=null, sc2=null, live=false, detail='', fin=false;

  /* Pull scores / live state from ESPN */
  var g=bktFindGame(n1,n2);
  if(g){
    var gt1=(g.t1.matched&&g.t1.matched.name)===n1?g.t1:g.t2;
    var gt2=(g.t2.matched&&g.t2.matched.name)===n2?g.t2:g.t1;
    sc1=gt1.score; sc2=gt2.score;
    if(liveGames.indexOf(g)>-1){ live=true; detail=g.detail||'LIVE'; }
    if(completedGames.indexOf(g)>-1) fin=true;
  }
  /* If no ESPN data but team flag set, treat as final */
  if(!fin&&!live&&t1&&t2&&(t1[flag]||t2[flag])) fin=true;

  var timeStr='';
  if(!fin&&!live&&g&&g.evDate){
    try{
      var d=new Date(g.evDate);
      var dow=d.toLocaleDateString('en-US',{timeZone:'America/New_York',weekday:'short'});
      var md=d.toLocaleDateString('en-US',{timeZone:'America/New_York',month:'numeric',day:'numeric'});
      var tm=d.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:true});
      timeStr=dow+' '+md+' · '+tm+' ET';
    }catch(e){}
  }

  var brd=live?'rgba(34,197,94,.3)':'rgba(255,255,255,.06)';
  var shd=live?'box-shadow:0 0 8px rgba(34,197,94,.1);':'';
  var statusColor=live?'#22c55e':fin?'#444466':'#7878a8';
  var statusTxt=live?detail:fin?'FINAL':timeStr||'';

  return '<div style="background:rgba(255,255,255,.03);border:1px solid '+brd+';border-radius:8px;overflow:hidden;'+shd+'">'
    +bktRow(n1,flag,n2,sc1,live)
    +'<div style="height:1px;background:rgba(255,255,255,.04);margin:0 8px"></div>'
    +bktRow(n2,flag,n1,sc2,live)
    +'<div style="padding:2px 8px 4px"><span style="font-size:9px;font-weight:700;color:'+statusColor+';letter-spacing:.5px">'+statusTxt+'</span></div>'
    +'</div>';
}

/* Advancement slot — shows team advancing to next round, with owner capsule */
function bktAdvSlot(teamName, label) {
  var t=teamName?bktTeam(teamName):null;
  var oc=t&&OWNERS[t.owner]?OWNERS[t.owner].color:null;
  var logo=t?(t.logo||LOGOS[t.name]||''):'';
  return '<div style="background:'+(oc?oc+'18':'rgba(255,255,255,.025)')+';border:1px solid '+(oc?oc+'40':'rgba(255,255,255,.06)')+';border-radius:8px;padding:6px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:100%;min-height:52px;position:relative;overflow:hidden">'
    +(oc?'<div style="position:absolute;top:0;left:0;right:0;height:2px;background:'+oc+'"></div>':'')
    +'<span style="font-size:9px;font-weight:800;letter-spacing:1.5px;color:#5c5c72;text-transform:uppercase">'+label+'</span>'
    +(t&&logo?'<img src="'+logo+'" style="width:16px;height:16px;object-fit:contain;border-radius:2px;background:#eeeef6" onerror="this.style.display=\'none\'">':'')
    +'<span style="font-size:10px;font-weight:700;color:'+(t?'#d0d0e8':'#2a2a3a')+';text-align:center;line-height:1.2;max-width:62px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(t?t.name:'TBD')+'</span>'
    +(t?'<div style="margin-top:1px">'+bktOwnerCap(t.owner)+'</div>':'')
    +'</div>';
}

/* TBD placeholder (game not yet known) */
function bktTBDSlot(label) {
  return '<div style="background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.07);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px;min-height:52px">'
    +'<span style="font-size:9px;font-weight:800;letter-spacing:1.5px;color:#5c5c72;text-transform:uppercase">'+label+'</span>'
    +'<span style="font-size:10px;color:#2a2a3a">TBD</span>'
    +'</div>';
}

/* Bracket connector — two games → one advancement slot */
var BKT_CONNECTOR=
  '<div style="width:14px;flex-shrink:0;position:relative;margin:12px 0">'
    +'<div style="position:absolute;top:0;left:0;right:0;height:50%;border-top:1px solid #252535;border-right:1px solid #252535;border-radius:0 4px 0 0"></div>'
    +'<div style="position:absolute;bottom:0;left:0;right:0;height:50%;border-bottom:1px solid #252535;border-right:1px solid #252535;border-radius:0 0 4px 0"></div>'
  +'</div>';
var BKT_LINE=
  '<div style="width:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center">'
    +'<div style="width:14px;height:1px;background:#252535"></div>'
  +'</div>';

function renderBracket() {
  var el=document.getElementById('bracket-content'); if(!el) return;

  /* helper: S16 winner from a pairing */
  function s16W(p){
    var ta=bktTeam(p.top), tb=bktTeam(p.bot);
    if(ta&&ta.wonS16) return p.top;
    if(tb&&tb.wonS16) return p.bot;
    return null;
  }

  /* Build region lookup: name → {w1, w2, color, f4Adv} */
  var regData={};
  BRACKET_REGIONS.forEach(function(reg){
    var w1=s16W(reg.s16[0]), w2=s16W(reg.s16[1]);
    regData[reg.name]={
      w1:w1, w2:w2, color:reg.color,
      f4Adv:bktRegAdv(reg.name,'wonE8')
    };
  });

  var html='<div style="padding-top:4px">';
  html+='<div style="font-size:10px;font-weight:600;letter-spacing:2px;color:#3a3a55;text-transform:uppercase;margin-bottom:12px;padding-left:2px">Elite 8 → Final Four</div>';

  /* ══ Two F4 pairings, each with 2 E8 games → 1 F4 slot ══ */
  F4_PAIRINGS.forEach(function(pair){
    var rA=regData[pair.a], rB=regData[pair.b];
    var regA=BRACKET_REGIONS.find(function(r){return r.name===pair.a;});
    var regB=BRACKET_REGIONS.find(function(r){return r.name===pair.b;});

    /* E8 game cards (or TBD) */
    var cardA=(rA.w1&&rA.w2)?bktCard(rA.w1,rA.w2,'E8'):bktTBDSlot(pair.a+' E8');
    var cardB=(rB.w1&&rB.w2)?bktCard(rB.w1,rB.w2,'E8'):bktTBDSlot(pair.b+' E8');

    /* F4 advancement: who won E8 in each region */
    var f4a=rA.f4Adv, f4b=rB.f4Adv;
    var f4SlotHtml;
    if(f4a&&f4b){
      /* Both E8 done — show F4 game card */
      f4SlotHtml='<div style="flex:1;display:flex;align-items:center">'+bktCard(f4a.name,f4b.name,'F4')+'</div>';
    } else {
      f4SlotHtml='<div style="width:68px;flex-shrink:0;display:flex;align-items:center">'
        +bktAdvSlot(null,'F4')
      +'</div>';
    }

    html+='<div style="margin-bottom:20px">'
      /* Region labels */
      +'<div style="display:flex;gap:8px;margin-bottom:8px;padding-left:2px">'
        +'<span style="font-size:10px;font-weight:700;color:'+rA.color+';letter-spacing:2px;text-transform:uppercase">'+pair.a+'</span>'
        +'<span style="font-size:10px;color:#2a2a3a">×</span>'
        +'<span style="font-size:10px;font-weight:700;color:'+rB.color+';letter-spacing:2px;text-transform:uppercase">'+pair.b+'</span>'
      +'</div>'
      +'<div style="display:flex;align-items:stretch;gap:0">'
        +'<div style="flex:1;display:flex;flex-direction:column;gap:4px">'
          +cardA
          +cardB
        +'</div>'
        +BKT_CONNECTOR
        +f4SlotHtml
      +'</div>'
    +'</div>';
  });

  html+='</div>';
  el.innerHTML=html;
}

/* ═══════════════════════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════════════════════ */

var ROUND_ORDER=['R64','R32','S16','E8','F4','NCG'];
function getCurrentRound() {
  /* Live games → lowest round (E8 before F4).
     Upcoming   → lowest round (still in E8 if E8 upcoming).
     Completed  → highest round (show latest finished round). */
  var i,r;
  /* live: pick lowest */
  for(i=0;i<ROUND_ORDER.length;i++){
    r=ROUND_ORDER[i];
    if(liveGames.some(function(g){return g.round===r;})) return r;
  }
  /* upcoming: pick lowest */
  for(i=0;i<ROUND_ORDER.length;i++){
    r=ROUND_ORDER[i];
    if(upcomingGames.some(function(g){return g.round===r;})) return r;
  }
  /* completed: pick highest */
  var best='R64';
  ROUND_ORDER.forEach(function(r){
    if(completedGames.some(function(g){return g.round===r;})) best=r;
  });
  return best;
}

/* ── SPLASH ───────────────────────────────────────────── */
var _splashShown = false;
function showSplash() {
  if(_splashShown) return;
  if(sessionStorage.getItem('splashSeen')) return;
  _splashShown = true;

  var cr = getCurrentRound();
  var roundFull = {'R64':'Round of 64','R32':'Round of 32','S16':'Sweet 16','E8':'Elite 8','F4':'Final Four','NCG':'Championship'}[cr]||cr;
  var isLive = liveGames.length > 0;
  var hasUpcomingS16 = upcomingGames.some(function(g){ return g.round==='S16'; });

  /* Top 3 by net */
  var sorted = Object.keys(OWNERS).sort(function(a,b){ return ownerNet(b)-ownerNet(a); });
  var medals = ['1','2','3'];
  var podiumHtml = sorted.slice(0,3).map(function(oid,i){
    var o = OWNERS[oid];
    var net = ownerNet(oid);
    var netStr = (net>=0?'+$':'-$')+c(Math.abs(net));
    var cls = net>=0?'pos':'neg';
    return '<div class="splash-rank-row">'
      + '<span class="splash-rank-num">'+medals[i]+'</span>'
      + '<span class="splash-rank-name" style="color:'+o.color+'">'+o.name+'</span>'
      + '<span class="splash-rank-net '+cls+'">'+netStr+'</span>'
    + '</div>';
  }).join('');

  /* Live game logo pairs */
  var gamesHtml = '';
  if(isLive) {
    gamesHtml = liveGames.map(function(g){
      function logoEl(t) {
        var src = (t.matched&&(t.matched.logo||LOGOS[t.matched.name]))||'';
        return src
          ? '<img src="'+src+'" class="splash-logo" onerror="this.style.display=\'none\'">'
          : '<div class="splash-logo-fb">'+(t.matched?t.matched.seed:'?')+'</div>';
      }
      var hasScore = g.t1.score||g.t2.score;
      var scoreHtml = hasScore
        ? '<span class="splash-score">'+g.t1.score+'</span>'
          + '<span class="splash-vs">–</span>'
          + '<span class="splash-score">'+g.t2.score+'</span>'
        : '<span class="splash-vs">vs</span>';
      var detailHtml = g.detail ? '<div class="splash-game-detail">'+g.detail+'</div>' : '';
      return '<div class="splash-game-pair">'
        + '<div class="splash-game-row"><span class="splash-live-dot"></span>'+logoEl(g.t1)+scoreHtml+logoEl(g.t2)+'</div>'
        + detailHtml
      + '</div>';
    }).join('');
  }

  /* Recent updates — live game data, priority ordered, max 3 */
  var _sp = computeSidePots();
  var _r1w = getR1Winners();
  var _s16w = getS16Winners();
  var _ups = [];
  if(_sp.upsetWinners.length && _sp.upsetTeams.length)
    _ups.push({p:10, text:'⚡ Biggest Upset: '+_sp.upsetTeams[0]+' (+'+_sp.bupsetDiff+' seed diff) — '+OWNERS[_sp.upsetWinners[0]].name});
  if(_sp.lossConfirmed && _sp.lossTeams.length)
    _ups.push({p:9,  text:'📉 Biggest Loss: '+_sp.lossTeams[0]+' — '+OWNERS[_sp.lossWinners[0]].name+' wins $'+c(POTS.loss)});
  if(_sp.seed15Confirmed && _sp.seed15Teams.length)
    _ups.push({p:9,  text:'🏅 Best 15/16: '+_sp.seed15Teams[0]+' — '+OWNERS[_sp.seed15Winners[0]].name+' wins $'+c(POTS.seed15)});
  if(_s16w.length > 0)
    _ups.push({p:8,  text:'🏀 '+_s16w.length+' team'+(_s16w.length>1?'s':'')+' advancing to Sweet 16'});
  if(_r1w.length > 0)
    _ups.push({p:7,  text:'💰 R1 payouts set — $'+c(getR1PerTeam())+'/team ('+_r1w.length+' winners)'});
  if(liveGames.length > 0)
    _ups.push({p:6,  text:'🔴 '+liveGames.length+' game'+(liveGames.length>1?'s':'')+' live now'});
  _ups.sort(function(a,b){ return b.p-a.p; });
  var updatesHtml = _ups.slice(0,3).map(function(u){ return '<li>'+u.text+'</li>'; }).join('');

  /* Round alert / status banner */
  var alertHtml = '';
  if(isLive) {
    alertHtml = '<div class="splash-alert"><div class="splash-alert-dot"></div>'+roundFull+' in progress — earnings subject to change as results finalize</div>';
  } else if(cr==='S16' || hasUpcomingS16) {
    /* Between rounds: R32 complete, S16 upcoming */
    var s16Start = '';
    if(upcomingGames.length) {
      var s16Game = upcomingGames.find(function(g){ return g.round==='S16'; });
      if(s16Game && s16Game.date) {
        var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var p=s16Game.date.split('-');
        s16Start = ' · starts '+months[parseInt(p[1],10)-1]+' '+parseInt(p[2],10);
      }
    }
    alertHtml = '<div class="splash-alert" style="background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.2);color:#22c55e;flex-direction:column;align-items:center;gap:2px;text-align:center"><b>✓ Sweet 16 Official · Payouts All Updated</b><div style="font-size:9px;color:#3a5a3a">Next Round starts Thursday, Mar 26</div></div>';
  }

  /* Upcoming S16 games section (shown when not live) */
  var upcomingS16Html = '';
  if(!isLive && hasUpcomingS16) {
    var s16Games = upcomingGames.filter(function(g){ return g.round==='S16'; });
    upcomingS16Html = '<div class="splash-section"><div class="splash-sec-lbl">Sweet 16 · Up Next</div><div class="splash-games" style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'
      + s16Games.slice(0,4).map(function(g){
          function logoEl(t) {
            var src = (t.matched&&(t.matched.logo||LOGOS[t.matched.name]))||'';
            return src
              ? '<img src="'+src+'" class="splash-logo" onerror="this.style.display=\'none\'">'
              : '<div class="splash-logo-fb">'+(t.matched?t.matched.seed:'?')+'</div>';
          }
          var timeStr = '';
          if(g.evDate) {
            try {
              var d=new Date(g.evDate);
              var dow=d.toLocaleDateString('en-US',{timeZone:'America/New_York',weekday:'short'});
              var md =d.toLocaleDateString('en-US',{timeZone:'America/New_York',month:'numeric',day:'numeric'});
              var tm =d.toLocaleTimeString('en-US',{timeZone:'America/New_York',hour:'numeric',minute:'2-digit',hour12:true});
              timeStr = dow+' '+md+' · '+tm+' EDT';
            } catch(e){}
          }
          var detail = g.detail || timeStr;
          function ownerCap(t) {
            var o = t.matched && OWNERS[t.matched.owner];
            return o ? '<span style="background:'+o.color+';color:#000;font-size:7px;font-weight:700;padding:1px 5px;border-radius:20px;letter-spacing:.2px;white-space:nowrap">'+o.name+'</span>' : '';
          }
          return '<div class="splash-game-pair">'
            + '<div class="splash-game-row">'
              + '<div style="display:flex;flex-direction:column;align-items:center;gap:3px">'+logoEl(g.t1)+ownerCap(g.t1)+'</div>'
              + '<span class="splash-vs">vs</span>'
              + '<div style="display:flex;flex-direction:column;align-items:center;gap:3px">'+logoEl(g.t2)+ownerCap(g.t2)+'</div>'
            + '</div>'
            + (detail?'<div class="splash-game-detail">'+detail+'</div>':'')
          + '</div>';
        }).join('')
    + '</div>'
    + '</div>';
  }

  var statusLine = isLive
    ? roundFull.toUpperCase()+' · LIVE'
    : (cr==='S16'||hasUpcomingS16) ? 'R32 COMPLETE · SWEET 16 UPCOMING'
    : roundFull.toUpperCase();

  var html = '<div id="splash-overlay" onclick="if(event.target===this)closeSplash()">'
    + '<div id="splash-box">'
      + '<div class="splash-hdr">'
        + '<div class="splash-title">Calcutta 2026</div>'
        + '<div class="splash-sub">MARCH MADNESS · $27,160 POT · '+statusLine+'</div>'
      + '</div>'
      + alertHtml
      + '<div class="splash-section">'
        + '<div class="splash-sec-lbl">Standings</div>'
        + '<div class="splash-podium">'+podiumHtml+'</div>'
      + '</div>'
      + (isLive
          ? '<div class="splash-section"><div class="splash-sec-lbl">Live Now</div><div class="splash-games">'+gamesHtml+'</div></div>'
          : upcomingS16Html)
      + '<div class="splash-footer">'
        + '<button class="splash-dismiss" onclick="closeSplash()">Let\'s go →</button>'
      + '</div>'
    + '</div>'
  + '</div>';

  var el = document.createElement('div');
  el.innerHTML = html;
  document.body.appendChild(el.firstChild);
}

function closeSplash() {
  var ov = document.getElementById('splash-overlay');
  if(ov) ov.remove();
  sessionStorage.setItem('splashSeen','1');
}

function renderAll() {
  var currentRound=getCurrentRound();
  var rt=document.getElementById('round-txt');
  var pill=document.getElementById('round-pill');
  var liveNow=liveGames.length>0;
  var hasUpcoming=upcomingGames.length>0;

  /* Human-readable labels for each round state */
  var roundLabel={'R64':'Round of 64','R32':'Round of 32','S16':'Sweet 16','E8':'Elite 8','F4':'Final Four','NCG':'Championship'}[currentRound]||currentRound;

  if(rt) {
    if(liveNow) {
      /* Games in progress — red pulsing badge */
      rt.textContent=roundLabel+' · Live';
      if(pill) pill.className='live-badge';
    } else if(hasUpcoming) {
      /* Upcoming games exist for this round — blue stable */
      rt.textContent=roundLabel+' · Up Next';
      if(pill) pill.className='live-badge complete';
    } else {
      /* Between rounds — show previous round as complete */
      var prevLabel={'R64':'Round of 64 · Complete','R32':'Round of 32 · Complete','S16':'Sweet 16 · Complete','E8':'Elite 8 · Complete','F4':'Final Four · Complete','NCG':'Champion Crowned'}[currentRound]||roundLabel+' · Complete';
      rt.textContent=prevLabel;
      if(pill) pill.className='live-badge complete';
    }
  }
  renderTeams();
  renderGames();
  renderPayouts();
  renderBracket();
}

/* ── BOOT ─────────────────────────────────────────────── */
renderAll();
startPolling(); /* showSplash() fires inside startPolling after first ESPN fetch */

</script>
