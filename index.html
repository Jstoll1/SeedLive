<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Calcutta 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  background:#08080f;
  color:#e2e2ef;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  -webkit-font-smoothing:antialiased;
  height:100%;
  overflow:hidden;
}

/* ── LAYOUT ─────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:430px;margin:0 auto;position:relative}

/* ── HEADER ─────────────────────────────────────────── */
.hdr{
  padding:env(safe-area-inset-top,12px) 16px 10px;
  padding-top:max(env(safe-area-inset-top),16px);
  background:#08080f;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  border-bottom:1px solid #13131e;
}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:-.4px;color:#fff}
.hdr-sub{font-size:11px;color:#3a3a55;margin-top:1px;letter-spacing:.3px}
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:#160d0d;border:1px solid rgba(224,82,82,.4);
  border-radius:20px;padding:4px 10px;
  font-size:10px;font-weight:700;letter-spacing:1.5px;color:#e05252;
  text-transform:uppercase;white-space:nowrap;
}
.live-dot{width:5px;height:5px;border-radius:50%;background:#e05252;animation:pulse 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes amber-pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SCROLL AREA ─────────────────────────────────────── */
.scroll-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:12px 12px 0;
}

/* ── BOTTOM NAV ──────────────────────────────────────── */
.bottom-nav{
  display:flex;flex-shrink:0;
  background:#0c0c16;
  border-top:1px solid #13131e;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:10px 4px 8px;
  border:none;background:transparent;
  color:#3a3a55;font-size:10px;font-weight:500;
  cursor:pointer;transition:color .15s;
  min-height:54px;
}
.nav-btn.on{color:#e2e2ef}
.nav-btn.on .nav-icon{color:#f59e0b}
.nav-icon{font-size:20px;line-height:1;transition:color .15s}
.nav-label{font-size:10px;letter-spacing:.3px}

/* ── PANELS ──────────────────────────────────────────── */
.panel{display:none}
.panel.on{display:block}

/* ── SECTION LABEL ───────────────────────────────────── */
.sec-label{
  font-size:10px;font-weight:600;letter-spacing:2.5px;
  color:#3a3a55;text-transform:uppercase;
  margin:16px 0 8px;
}
.sec-label:first-child{margin-top:0}

/* ══════════════════════════════════════════════════════
   TEAMS TAB — grouped by owner
══════════════════════════════════════════════════════ */
.owner-list{display:flex;flex-direction:column;gap:10px;padding-bottom:16px}

.ocard{
  background:#111119;border-radius:14px;
  overflow:hidden;border:1px solid #1a1a27;
  position:relative;
}
.ocard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--oc)}
.ocard.has-live{border-color:rgba(245,158,11,.3)}

/* owner header row */
.ocard-hdr{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:13px 14px 10px;
}
.ocard-left{}
.ocard-name{font-size:17px;font-weight:800;color:var(--oc);line-height:1;letter-spacing:-.3px}
.ocard-stats{font-size:11px;color:#3a3a55;margin-top:5px;line-height:1.7}
.ocard-stats b{color:#5a5a7a}
.ocard-right{text-align:right}
.ocard-net{font-size:20px;font-weight:800;line-height:1;color:#3a3a55}
.ocard-net.pos{color:#22c55e}
.ocard-netlabel{font-size:8px;font-weight:600;letter-spacing:1.5px;color:#2a2a3a;text-transform:uppercase;margin-top:2px}

/* team chips grid — 3 per row */
.ocard-teams{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:#16161f;
  border-top:1px solid #16161f;
}
.tchip{
  background:#111119;
  display:flex;align-items:center;gap:8px;
  padding:9px 10px;
  position:relative;
}
.tchip.live{background:#130f07}
.tchip.earned{background:#0c130c}
.tchip.lost{background:#0e0e14;opacity:.4}

/* live pulse bar — left edge */
.tchip.live::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:#f59e0b;animation:pulse 1.2s ease-in-out infinite;
}
.tchip.earned::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:#22c55e;
}

.tchip-logo{width:30px;height:30px;border-radius:7px;object-fit:contain;background:#1a1a28;flex-shrink:0}
.tchip-logo-fb{width:30px;height:30px;border-radius:7px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#34344a;flex-shrink:0}
.tchip-info{flex:1;min-width:0}
.tchip-seed{font-size:8px;font-weight:700;color:#3a3a55;letter-spacing:.3px;line-height:1}
.tchip-name{font-size:10px;font-weight:600;color:#9090aa;line-height:1.25;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tchip.live  .tchip-name{color:#f59e0b}
.tchip.live  .tchip-seed{color:#7a5500}
.tchip.earned .tchip-name{color:#4ade80}
.tchip.lost  .tchip-name{text-decoration:line-through;color:#2c2c3e}

/* earn tag on chip */
.tchip-earn{font-size:7px;font-weight:800;color:#4ade80;letter-spacing:.2px;margin-top:2px}
.tchip-live-dot{width:5px;height:5px;border-radius:50%;background:#f59e0b;animation:pulse 1s ease-in-out infinite;flex-shrink:0;margin-left:auto}

/* ══════════════════════════════════════════════════════
   GAMES TAB — full-width matchup cards
══════════════════════════════════════════════════════ */
.games-section{margin-bottom:20px}
.games-sec-hdr{
  font-size:10px;font-weight:700;letter-spacing:2.5px;
  color:#3a3a55;text-transform:uppercase;
  margin-bottom:8px;display:flex;align-items:center;gap:8px;
}
.games-sec-hdr .live-dot{width:6px;height:6px;background:#ef4444}
.game-list{display:flex;flex-direction:column;gap:8px}

/* matchup card */
.mcard{
  background:#111119;border-radius:14px;
  overflow:hidden;border:1px solid #1a1a27;
}
.mcard.live{border-color:rgba(239,68,68,.35);background:#120a0a}
.mcard.final{border-color:#181825}

/* card top bar */
.mcard-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px 6px;border-bottom:1px solid #16161f;
  font-size:9px;font-weight:700;letter-spacing:1.5px;
  color:#3a3a55;text-transform:uppercase;
}
.mcard.live .mcard-top{color:#ef4444}
.mcard-top-left{display:flex;align-items:center;gap:5px}
.mcard-round{color:inherit}
.mcard-top-right{font-size:9px;font-weight:600;color:#3a3a55}

/* two-team layout */
.mcard-teams{display:grid;grid-template-columns:1fr 44px 1fr;align-items:center}
.mcard-team{display:flex;flex-direction:column;align-items:center;padding:12px 8px 10px;gap:6px}
.mcard-team.left{align-items:flex-start;padding-left:12px}
.mcard-team.right{align-items:flex-end;padding-right:12px}

/* team logo in matchup */
.mcard-logo{width:36px;height:36px;border-radius:9px;object-fit:contain;background:#1a1a28;flex-shrink:0}
.mcard-logo-fb{width:36px;height:36px;border-radius:9px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#34344a;flex-shrink:0}

/* team info */
.mcard-tinfo{display:flex;flex-direction:column;gap:3px;min-width:0;width:100%}
.mcard-team.left .mcard-tinfo{align-items:flex-start}
.mcard-team.right .mcard-tinfo{align-items:flex-end}
.mcard-tname{font-size:12px;font-weight:600;color:#d0d0e4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.mcard-tname.winner{color:#22c55e}
.mcard-tname.loser{color:#2c2c3e;text-decoration:line-through}
.mcard-tags{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.mcard-team.right .mcard-tags{justify-content:flex-end}
.mcard-seed{font-size:9px;font-weight:700;color:#3a3a55;letter-spacing:.3px}
.mcard-owner-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;color:#000;letter-spacing:.2px}

/* earn badge in matchup */
.mcard-earn{
  font-size:9px;font-weight:700;
  padding:2px 6px;border-radius:4px;
  white-space:nowrap;margin-top:2px;
}
.mcard-earn.r1{background:#0d1a07;color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.mcard-earn.s16{background:#0d0d20;color:#818cf8;border:1px solid rgba(129,140,248,.2)}

/* center score/vs */
.mcard-center{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:8px 0;gap:4px;
}
.mcard-score-wrap{display:flex;align-items:center;gap:6px}
.mcard-score{font-size:22px;font-weight:800;line-height:1;color:#4a4a66}
.mcard-score.winner{color:#22c55e}
.mcard-score.loser{color:#2c2c3e}
.mcard-dash{font-size:14px;font-weight:600;color:#2a2a3a}
.mcard-vs{font-size:11px;font-weight:700;color:#2a2a3a;letter-spacing:.5px}
.mcard-time{font-size:9px;color:#4a4a66;text-align:center;line-height:1.4}
.mcard-time.live-txt{color:#ef4444;font-weight:700;letter-spacing:.5px}

/* bottom pot bar */
.mcard-pot{
  padding:7px 12px;border-top:1px solid #16161f;
  font-size:10px;color:#4a4a66;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;
}
.mcard-pot-label{font-size:9px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#2a2a3a}
.mcard-pot-items{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.mcard-pot-item{
  display:flex;align-items:center;gap:4px;
  font-size:9px;font-weight:700;
  background:#14141e;border-radius:5px;padding:3px 7px;
}
.mcard-pot-item.r1-item{color:#4ade80}
.mcard-pot-item.s16-item{color:#818cf8}

/* ══════════════════════════════════════════════════════
   STANDINGS TAB
══════════════════════════════════════════════════════ */
.stand-list{display:flex;flex-direction:column;gap:8px;padding-bottom:16px}
.stand-card{
  background:#111119;border-radius:14px;
  padding:14px 14px 12px;
  position:relative;overflow:hidden;
  border:1px solid #1a1a27;
}
.stand-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--oc)}
.stand-rank{position:absolute;top:12px;right:13px;font-size:11px;color:#252535;font-weight:800}
.stand-net{font-size:28px;font-weight:800;line-height:1;color:#4a4a66}
.stand-net.pos{color:#22c55e}
.stand-name{font-size:14px;font-weight:700;color:var(--oc);margin-top:3px}
.stand-stats{font-size:11px;color:#3a3a55;margin-top:7px;line-height:1.7}
.stand-stats b{color:#6a6a88}
.stand-teams{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;padding-top:9px;border-top:1px solid #17172a}
.stand-team-chip{
  display:flex;align-items:center;gap:4px;
  background:#161625;border-radius:6px;padding:3px 6px 3px 4px;
}
.stand-chip-logo{width:18px;height:18px;border-radius:4px;object-fit:contain;background:#1a1a28;flex-shrink:0}
.stand-chip-logo-fb{width:18px;height:18px;border-radius:4px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#34344a;flex-shrink:0}
.stand-chip-name{font-size:9px;color:#5a5a7a;font-weight:500}
.stand-chip-name.earn{color:#4ade80}
.stand-chip-live{width:5px;height:5px;border-radius:50%;background:#f59e0b;animation:pulse 1.2s ease-in-out infinite;flex-shrink:0}

/* ══════════════════════════════════════════════════════
   PAYOUTS TAB
══════════════════════════════════════════════════════ */
.pay-list{display:flex;flex-direction:column;gap:8px;padding-bottom:16px}
.pcard{background:#111119;border-radius:14px;padding:14px;border:1px solid #1a1a27}
.pcard-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.pcard-name{font-size:13px;font-weight:700;color:#c0c0dc}
.pcard-pct{font-size:10px;color:#3a3a55;margin-top:2px}
.pcard-amt{font-size:16px;font-weight:800;color:#f59e0b;white-space:nowrap}
.pcard-note{font-size:10px;color:#4a4a66;margin-top:7px;line-height:1.65}
.pcard-rule{font-size:10px;color:#555570;margin-top:6px;line-height:1.6;background:#14141e;border-radius:7px;padding:8px 10px}
.pcard-sep{height:1px;background:#18182a;margin:9px 0}
.pcard-winners{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.pwinner{display:inline-flex;align-items:center;gap:6px;background:#18182a;border-radius:6px;padding:5px 9px 5px 5px}
.pw-logo{width:20px;height:20px;border-radius:5px;object-fit:contain;background:#1a1a28;flex-shrink:0}
.pw-logo-fb{width:20px;height:20px;border-radius:5px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#3a3a55;flex-shrink:0}
.pw-name{font-size:11px;color:#c0c0dc;font-weight:500}
.pw-tag{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;color:#000}
.pw-amt{font-size:11px;font-weight:700;color:#22c55e;margin-left:2px}
.pcard-tbd{font-size:10px;color:#2a2a3a;font-style:italic;margin-top:7px}
.pcard-leader{font-size:10px;color:#5a5a7a;margin-top:6px;line-height:1.6;background:#13131e;border-radius:6px;padding:7px 10px}
.pcard-sec{font-size:10px;font-weight:600;letter-spacing:2px;color:#3a3a55;text-transform:uppercase;margin:18px 0 8px}

/* ── SCROLLBAR ───────────────────────────────────────── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#252535;border-radius:3px}
</style>
</head>

/* ═══════════════════════════════════════════════════════
   CALCULATIONS
═══════════════════════════════════════════════════════ */

function getR1Winners() { return TEAMS.filter(function(t){ return t.r1eligible && t.wonR1; }); }
function getR1PerTeam() { var w=getR1Winners().length; return w>0?Math.ceil(POTS.r1/w):0; }

function computeS16PerTeam() {
  var eligible = TEAMS.filter(function(t){ return t.seed>=4 && t.status!=='lost'; });
  var projected = Math.min(eligible.length, 16);
  return projected>0 ? Math.ceil(POTS.s16/projected) : 0;
}

function teamEarned(t) {
  if (t.r1eligible && t.wonR1) return getR1PerTeam();
  return 0;
}

function ownerEarned(oid) {
  var total=0, r1pp=getR1PerTeam();
  TEAMS.forEach(function(t){ if(t.owner===oid && t.r1eligible && t.wonR1) total+=r1pp; });
  return total;
}

function ownerNet(oid) { return ownerEarned(oid)-OWNERS[oid].paid; }

/* ═══════════════════════════════════════════════════════
   ESPN LIVE DATA
═══════════════════════════════════════════════════════ */

var liveGames=[], completedGames=[], upcomingGames=[];
var knownR32Dates={};

function espnNameMatch(n) {
  n=(n||'').toLowerCase().trim();
  for(var i=0;i<TEAMS.length;i++){
    var t=TEAMS[i];
    for(var j=0;j<t.espn.length;j++){ if(n===t.espn[j]) return t; }
  }
  return null;
}

function toETDate(iso) {
  try {
    var d=new Date(iso);
    var s=d.toLocaleDateString('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit'});
    var p=s.split('/');
    return p[2]+'-'+p[0]+'-'+p[1];
  } catch(e){ return ''; }
}

function getGameRound(ev, teams) {
  var comp=ev.competitions&&ev.competitions[0];
  if(comp&&comp.notes&&comp.notes.length){
    var hl=(comp.notes[0].headline||'').toLowerCase();
    if(hl.indexOf('second')>-1||hl.indexOf('2nd')>-1||hl.indexOf('round of 32')>-1){
      var d=toETDate(ev.date||''); if(d) knownR32Dates[d]=true; return 'R32';
    }
    if(hl.indexOf('sweet')>-1)  return 'S16';
    if(hl.indexOf('elite')>-1)  return 'E8';
    if(hl.indexOf('final four')>-1||hl.indexOf('semifinal')>-1) return 'F4';
    if(hl.indexOf('national')>-1||hl.indexOf('championship')>-1) return 'NCG';
  }
  if(teams){
    var matched=teams.filter(function(t){return t.matched;});
    if(matched.length>=2&&matched.every(function(t){return t.matched.status==='won';})){
      var d2=toETDate(ev.date||''); if(d2) knownR32Dates[d2]=true; return 'R32';
    }
  }
  return 'R64';
}

function processESPN(data) {
  if(!data||!data.events) return;
  liveGames=[]; completedGames=[]; upcomingGames=[];

  data.events.forEach(function(ev){
    if(!ev.competitions||!ev.competitions[0]) return;
    var comp=ev.competitions[0];
    var comps=comp.competitors;
    if(!comps||comps.length<2) return;

    var state=comp.status&&comp.status.type?comp.status.type.state:'pre';
    var detail=comp.status&&comp.status.type?comp.status.type.shortDetail:'';

    var teams=comps.map(function(c){
      var nm=c.team?(c.team.shortDisplayName||c.team.displayName||''):'';
      var nmAlt=c.team?(c.team.displayName||''):'';
      var matched=espnNameMatch(nm)||espnNameMatch(nmAlt);
      var sc=parseInt(c.score||'0',10)||0;
      var winner=c.winner===true;
      var logoUrl='';
      if(c.team){
        if(c.team.id) logoUrl='https://a.espncdn.com/i/teamlogos/ncaa/500/'+c.team.id+'.png';
        else if(c.team.logo) logoUrl=c.team.logo;
      }
      return {espnName:nm,matched:matched,score:sc,winner:winner,logoUrl:logoUrl};
    });

    var gameRound=getGameRound(ev,teams);

    /* Update team status from ESPN */
    teams.forEach(function(t){
      if(!t.matched) return;
      if(state==='in'){
        t.matched.status='live';
      } else if(state==='post'){
        if(t.winner){
          if(gameRound==='R64'&&t.matched.r1eligible) t.matched.wonR1=true;
          t.matched.status='won';
        } else {
          t.matched.status='lost';
        }
      }
      if(t.logoUrl) t.matched.logo=t.logoUrl;
    });

    var g={t1:teams[0],t2:teams[1],round:gameRound,detail:detail,date:toETDate(ev.date||''),evDate:ev.date||''};
    if(state==='in')        liveGames.push(g);
    else if(state==='post') completedGames.push(g);
    else                    upcomingGames.push(g);
  });

  renderAll();
}

function dateSectionLabel(ymd) {
  if(!ymd) return 'UPCOMING';
  if(knownR32Dates[ymd]) return 'ROUND OF 32 · '+fmtDate(ymd);
  return 'ROUND OF 64 · '+fmtDate(ymd);
}

function fmtDate(ymd) {
  if(!ymd) return '';
  var months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var parts=ymd.split('-');
  return months[parseInt(parts[1],10)-1]+' '+parseInt(parts[2],10);
}

function startPolling() {
  function fetchAll() {
    var today=toETDate(new Date().toISOString());
    var yesterday=toETDate(new Date(Date.now()-86400000).toISOString());
    var tomorrow=toETDate(new Date(Date.now()+86400000).toISOString());
    var dates=[yesterday,today,tomorrow].filter(function(d,i,a){ return d&&a.indexOf(d)===i; });
    Promise.all(dates.map(function(d){
      return fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates='+d.replace(/-/g,''))
        .then(function(r){return r.json();}).catch(function(){return null;});
    })).then(function(results){
      var merged={events:[]};
      results.forEach(function(r){
        if(r&&r.events) merged.events=merged.events.concat(r.events);
      });
      processESPN(merged);
    });
  }
  fetchAll();
  setInterval(fetchAll, 30000);
}

/* ═══════════════════════════════════════════════════════
   RENDER — TEAMS (3-col alive grid)
═══════════════════════════════════════════════════════ */

function renderTeams() {
  var el    = document.getElementById('owner-list');
  var label = document.getElementById('teams-label');
  if(!el) return;

  var r1pp = getR1PerTeam();

  /* Sort owners by net P&L descending */
  var ownerIds = Object.keys(OWNERS).sort(function(a,b){ return ownerNet(b)-ownerNet(a); });

  var aliveTotal = TEAMS.filter(function(t){ return t.status!=='lost'; }).length;
  label.textContent = aliveTotal+' Teams Alive · '+ownerIds.length+' Owners';

  el.innerHTML = ownerIds.map(function(oid){
    var o       = OWNERS[oid];
    var earned  = ownerEarned(oid);
    var net     = ownerNet(oid);
    var netStr  = (net>=0?'+$':'-$')+Math.abs(net).toLocaleString();
    var netCls  = net>=0?'ocard-net pos':'ocard-net';
    var hasLive = TEAMS.some(function(t){ return t.owner===oid && t.status==='live'; });

    /* Sort teams: live → earned → alive → lost */
    var myTeams = TEAMS.filter(function(t){ return t.owner===oid; })
      .sort(function(a,b){
        function pri(t){
          if(t.status==='live')            return 0;
          if(t.wonR1 && t.r1eligible)      return 1;
          if(t.status==='won'||t.status==='alive') return 2+t.seed;
          return 100+t.seed; /* lost last */
        }
        return pri(a)-pri(b);
      });

    var aliveCount = myTeams.filter(function(t){ return t.status!=='lost'; }).length;

    var chips = myTeams.map(function(t){
      var isLive   = t.status==='live';
      var isLost   = t.status==='lost';
      var hasEarned= t.wonR1 && t.r1eligible;
      var te       = teamEarned(t);
      var logoSrc  = t.logo||LOGOS[t.name]||'';
      var chipCls  = 'tchip'+(isLive?' live':hasEarned?' earned':isLost?' lost':'');

      var nm = t.name
        .replace('Saint ','St. ')
        .replace('Northern ','N. ')
        .replace(' State',' St.');
      if(nm.length > 11) nm = nm.substring(0,10)+'…';

      var logoHtml = logoSrc
        ? '<img src="'+logoSrc+'" class="tchip-logo" onerror="this.style.display=\'none\'">'
        : '<div class="tchip-logo-fb">'+t.seed+'</div>';

      var earnLine = (te>0 && !isLive) ? '<div class="tchip-earn">+$'+Math.round(te)+' R1</div>' : '';
      var liveDot  = isLive ? '<div class="tchip-live-dot"></div>' : '';

      return '<div class="'+chipCls+'">'
        + logoHtml
        + '<div class="tchip-info">'
          + '<div class="tchip-seed">#'+t.seed+'</div>'
          + '<div class="tchip-name">'+nm+'</div>'
          + earnLine
        + '</div>'
        + liveDot
      + '</div>';
    }).join('');

    return '<div class="ocard'+(hasLive?' has-live':'')+'" style="--oc:'+o.color+'">'
      + '<div class="ocard-hdr">'
        + '<div class="ocard-left">'
          + '<div class="ocard-name">'+o.name+'</div>'
          + '<div class="ocard-stats">'
            + '<b>$'+o.paid.toLocaleString()+'</b> spent'
            + (earned>0?' · <b style="color:#4ade80">+$'+earned.toLocaleString()+'</b> earned':'')
            + ' · <b>'+aliveCount+'</b> alive'
          + '</div>'
        + '</div>'
        + '<div class="ocard-right">'
          + '<div class="'+netCls+'">'+netStr+'</div>'
          + '<div class="ocard-netlabel">Net P&L</div>'
        + '</div>'
      + '</div>'
      + '<div class="ocard-teams">'+chips+'</div>'
    + '</div>';
  }).join('');
}

function renderGames() {
  var el = document.getElementById('games-content');
  if(!el) return;

  var html = '';
  var r1pp  = getR1PerTeam();
  var s16pp = computeS16PerTeam();

  function earnBadges(t, round, isDone) {
    if(isDone || !t || !t.matched) return '';
    var tm = t.matched;
    var out = '';
    if(round==='R64' && tm.r1eligible && !tm.wonR1 && r1pp>0)
      out += '<div class="mcard-earn r1">+$'+r1pp+' R1</div>';
    if(round==='R32' && tm.seed>=4 && s16pp>0)
      out += '<div class="mcard-earn s16">+$'+s16pp+' S16</div>';
    return out;
  }

  function teamCol(t, round, isDone, side) {
    var tm = t.matched;
    var isWinner = isDone && t.winner;
    var isLoser  = isDone && !t.winner;
    var nameCls  = 'mcard-tname'+(isWinner?' winner':isLoser?' loser':'');
    var logoSrc  = (tm&&tm.logo)||LOGOS[tm&&tm.name]||'';
    var logoHtml = logoSrc
      ? '<img src="'+logoSrc+'" class="mcard-logo" onerror="this.style.display=\'none\'">'
      : '<div class="mcard-logo-fb">'+(tm?tm.seed:'?')+'</div>';
    var nm = tm ? tm.name : (t.espnName||'TBD');
    if(nm.length>13) nm = nm.replace('Saint ','St. ').replace('Northern ','N. ').replace(' State',' St.');
    var ownHtml = tm ? ownerTag(tm.owner,8) : '';
    var earn = earnBadges(t, round, isDone);

    return '<div class="mcard-team '+side+'">'
      + logoHtml
      + '<div class="mcard-tinfo">'
        + '<div class="'+nameCls+'">'+nm+'</div>'
        + '<div class="mcard-tags">'
          + (tm?'<span class="mcard-seed">#'+tm.seed+'</span>':'')
          + ownHtml
        + '</div>'
        + earn
      + '</div>'
    + '</div>';
  }

  /* LIVE */
  if(liveGames.length) {
    html += '<div class="games-section"><div class="games-sec-hdr"><span class="live-dot"></span>LIVE NOW</div><div class="game-list">';
    liveGames.forEach(function(g){
      var t1=g.t1, t2=g.t2;
      html += '<div class="mcard live">'
        + '<div class="mcard-top"><div class="mcard-top-left"><span class="live-dot"></span><span class="mcard-round">'+g.round+'</span></div><div class="mcard-top-right">'+g.detail+'</div></div>'
        + '<div class="mcard-teams">'
          + teamCol(t1,g.round,false,'left')
          + '<div class="mcard-center"><div class="mcard-score-wrap"><span class="mcard-score">'+t1.score+'</span><span class="mcard-dash">–</span><span class="mcard-score">'+t2.score+'</span></div><div class="mcard-time live-txt">LIVE</div></div>'
          + teamCol(t2,g.round,false,'right')
        + '</div>'
        + potBar(t1,t2,g.round,false)
      + '</div>';
    });
    html += '</div></div>';
  }

  /* UPCOMING — grouped by date */
  if(upcomingGames.length) {
    var byDate={};
    upcomingGames.forEach(function(g){
      var d=g.date||'unknown'; if(!byDate[d]) byDate[d]=[];
      byDate[d].push(g);
    });
    Object.keys(byDate).sort().forEach(function(d){
      var lbl = d==='unknown'?'UPCOMING':dateSectionLabel(d);
      html += '<div class="games-section"><div class="games-sec-hdr">'+lbl+'</div><div class="game-list">';
      byDate[d].forEach(function(g){
        var t1=g.t1,t2=g.t2;
        var timeStr=g.detail||'TBD';
        html += '<div class="mcard">'
          + '<div class="mcard-top"><div class="mcard-top-left"><span class="mcard-round">'+g.round+'</span></div><div class="mcard-top-right">'+timeStr+'</div></div>'
          + '<div class="mcard-teams">'
            + teamCol(t1,g.round,false,'left')
            + '<div class="mcard-center"><div class="mcard-vs">VS</div></div>'
            + teamCol(t2,g.round,false,'right')
          + '</div>'
          + potBar(t1,t2,g.round,false)
        + '</div>';
      });
      html += '</div></div>';
    });
  }

  /* COMPLETED */
  if(completedGames.length) {
    var cByDate={};
    completedGames.forEach(function(g){
      var d=g.date||'unknown'; if(!cByDate[d]) cByDate[d]=[];
      cByDate[d].push(g);
    });
    Object.keys(cByDate).sort().reverse().forEach(function(d){
      var lbl = d==='unknown'?'COMPLETED':dateSectionLabel(d);
      html += '<div class="games-section"><div class="games-sec-hdr">'+lbl+' · FINAL</div><div class="game-list">';
      cByDate[d].forEach(function(g){
        var t1=g.t1,t2=g.t2;
        var w=t1.winner?t1:t2, l=t1.winner?t2:t1;
        html += '<div class="mcard final">'
          + '<div class="mcard-top"><div class="mcard-top-left"><span class="mcard-round">'+g.round+' · FINAL</span></div><div class="mcard-top-right" style="color:#22c55e;font-weight:700">'+(w.matched?w.matched.name:'')+'</div></div>'
          + '<div class="mcard-teams">'
            + teamCol(t1,g.round,true,'left')
            + '<div class="mcard-center"><div class="mcard-score-wrap"><span class="mcard-score '+(t1.winner?'winner':'loser')+'">'+t1.score+'</span><span class="mcard-dash">–</span><span class="mcard-score '+(t2.winner?'winner':'loser')+'">'+t2.score+'</span></div><div class="mcard-time">FINAL</div></div>'
            + teamCol(t2,g.round,true,'right')
          + '</div>'
        + '</div>';
      });
      html += '</div></div>';
    });
  }

  if(!html) html='<div style="text-align:center;color:#2e2e44;font-size:12px;padding:40px 0;font-style:italic">Loading games…</div>';
  el.innerHTML = html;
}

function potBar(t1, t2, round, isDone) {
  if(isDone) return '';
  var r1pp=getR1PerTeam(), s16pp=computeS16PerTeam();
  var items=[];

  [t1,t2].forEach(function(t){
    if(!t.matched) return;
    var tm=t.matched, o=OWNERS[tm.owner];
    if(round==='R64' && tm.r1eligible && !tm.wonR1 && r1pp>0)
      items.push('<div class="mcard-pot-item r1-item">'+logoImg(tm,14,3)+'<span style="background:'+o.color+';color:#000;font-size:7px;font-weight:700;padding:1px 4px;border-radius:2px">'+o.name+'</span><span>+$'+r1pp+' R1</span></div>');
    if(round==='R32' && tm.seed>=4 && s16pp>0)
      items.push('<div class="mcard-pot-item s16-item">'+logoImg(tm,14,3)+'<span style="background:'+o.color+';color:#000;font-size:7px;font-weight:700;padding:1px 4px;border-radius:2px">'+o.name+'</span><span>+$'+s16pp+' S16</span></div>');
  });

  if(!items.length) return '';
  return '<div class="mcard-pot"><span class="mcard-pot-label">At stake</span><div class="mcard-pot-items">'+items.join('')+'</div></div>';
}

/* ═══════════════════════════════════════════════════════
   RENDER — STANDINGS
═══════════════════════════════════════════════════════ */

function renderStandings() {
  var el = document.getElementById('stand-list');
  if(!el) return;

  var owners = Object.keys(OWNERS).map(function(oid){
    return {oid:oid,o:OWNERS[oid],earned:ownerEarned(oid),net:ownerNet(oid)};
  }).sort(function(a,b){ return b.net-a.net; });

  el.innerHTML = owners.map(function(item,i){
    var oid=item.oid, o=item.o, net=item.net, earned=item.earned;
    var netCls = net>=0?'stand-net pos':'stand-net';
    var netStr = (net>=0?'+$':'-$')+Math.abs(net).toLocaleString();

    var myTeams = TEAMS.filter(function(t){ return t.owner===oid && t.status!=='lost'; })
      .sort(function(a,b){
        if(a.status==='live'&&b.status!=='live') return -1;
        if(b.status==='live'&&a.status!=='live') return 1;
        return a.seed-b.seed;
      });

    var chips = myTeams.map(function(t){
      var isLive=t.status==='live';
      var te=teamEarned(t);
      var logoSrc=t.logo||LOGOS[t.name]||'';
      var logoHtml = logoSrc
        ? '<img src="'+logoSrc+'" class="stand-chip-logo" onerror="this.style.display=\'none\'">'
        : '<div class="stand-chip-logo-fb">'+t.seed+'</div>';
      var liveIcon = isLive ? '<div class="stand-chip-live"></div>' : '';
      var nm = t.name.replace('Saint ','St. ').replace('Northern ','N. ');
      if(nm.length>10) nm=nm.substring(0,10)+'…';
      var nameCls = te>0?'stand-chip-name earn':'stand-chip-name';
      return '<div class="stand-team-chip">'+liveIcon+logoHtml+'<span class="'+nameCls+'">#'+t.seed+' '+nm+'</span></div>';
    }).join('');

    return '<div class="stand-card" style="--oc:'+o.color+'">'
      + '<div class="stand-rank">#'+(i+1)+'</div>'
      + '<div class="'+netCls+'">'+netStr+'</div>'
      + '<div class="stand-name">'+o.name+'</div>'
      + '<div class="stand-stats">'
        + '<b>$'+earned.toLocaleString()+'</b> earned · <b>$'+o.paid.toLocaleString()+'</b> paid'
        + (myTeams.length?' · <b>'+myTeams.length+'</b> alive':'')
      + '</div>'
      + '<div class="stand-teams">'+chips+'</div>'
    + '</div>';
  }).join('');
}

/* ═══════════════════════════════════════════════════════
   RENDER — PAYOUTS
═══════════════════════════════════════════════════════ */

function renderPayouts() {
  var el = document.getElementById('pay-list');
  if(!el) return;

  var r1pp = getR1PerTeam();
  var r1w  = getR1Winners();
  var s16Eligible = TEAMS.filter(function(t){ return t.seed>=4 && t.status!=='lost'; });

  function pLogoImg(t) { return logoImg(t, 20, 5); }

  /* R1 Winners */
  var r1Html = r1w.length
    ? r1w.map(function(t){
        return '<div class="pwinner">'+pLogoImg(t)+'<span class="pw-name">'+t.name+'</span>'+ownerTag(t.owner,8)+'<span class="pw-amt">+$'+r1pp+'</span></div>';
      }).join('')
    : '<div class="pcard-tbd">No winners yet</div>';

  var html =
    '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">Round of 64 Winners</div><div class="pcard-pct">10% of pot · seeds 8–16 only · split equally</div></div><div class="pcard-amt">$'+POTS.r1.toLocaleString()+'</div></div>'
    + '<div class="pcard-note">$'+r1pp+' per winner · '+r1w.length+' confirmed</div>'
    + '<div class="pcard-winners">'+r1Html+'</div>'
    + '</div>'

    + '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">Sweet 16</div><div class="pcard-pct">23% of pot · seeds 4–16 only · split equally</div></div><div class="pcard-amt">$'+Math.round(POTS.s16)+'</div></div>'
    + '<div class="pcard-note">~$'+computeS16PerTeam()+'/team if 16 advance · '+s16Eligible.length+' eligible still alive</div>'
    + '<div class="pcard-tbd">Winners determined after Round of 32</div>'
    + '</div>'

    + '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">Elite 8</div><div class="pcard-pct">10% of pot · seeds 1–3 only · split equally</div></div><div class="pcard-amt">$'+Math.round(POTS.e8)+'</div></div>'
    + '<div class="pcard-note">'+TEAMS.filter(function(t){return t.top3&&t.status!=='lost';}).length+' seeds 1–3 still alive</div>'
    + '<div class="pcard-tbd">Winners determined after Sweet 16</div>'
    + '</div>'

    + '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">Final Four</div><div class="pcard-pct">28% of pot · fixed per team</div></div><div class="pcard-amt">$'+Math.round(POTS.f4*4).toLocaleString()+'</div></div>'
    + '<div class="pcard-note">$'+Math.round(POTS.f4)+' per team — fixed, no dilution</div>'
    + '</div>'

    + '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">Championship Game</div><div class="pcard-pct">8% of pot · both finalists</div></div><div class="pcard-amt">$'+Math.round(POTS.finals*2).toLocaleString()+'</div></div>'
    + '<div class="pcard-note">$'+Math.round(POTS.finals)+' per finalist</div>'
    + '</div>'

    + '<div class="pcard">'
    + '<div class="pcard-hdr"><div><div class="pcard-name">National Champion</div><div class="pcard-pct">9% of pot · winner takes all</div></div><div class="pcard-amt">$'+Math.round(POTS.champ).toLocaleString()+'</div></div>'
    + '</div>';

  /* Side pots */
  var r64Done = completedGames.filter(function(g){ return g.round==='R64'; });

  /* Biggest Loss leader */
  var bloss=null, blossMargin=-1;
  r64Done.forEach(function(g){
    var winner=g.t1.winner?g.t1:g.t2, loser=g.t1.winner?g.t2:g.t1;
    if(!winner||!loser) return;
    var m=winner.score-loser.score;
    if(m>blossMargin||(m===blossMargin&&loser.score<(bloss?bloss.loser.score:Infinity))){
      blossMargin=m; bloss={winner:winner,loser:loser,margin:m};
    }
  });
  var blossHtml='<div class="pcard-tbd">Determined after all R64 games complete</div>';
  if(bloss){ var bt=bloss.loser.matched; blossHtml='<div class="pcard-leader">Current leader: <b style="color:#c4c4dc">'+(bt?bt.name:bloss.loser.espnName||'?')+'</b> '+(bt?ownerTag(bt.owner,8):'')+'<span style="color:#ef4444;font-weight:700"> — lost by '+bloss.margin+' pts</span></div>'; }

  /* Biggest Upset leader */
  var bupset=null,bupsetDiff=-1;
  r64Done.forEach(function(g){
    var winner=g.t1.winner?g.t1:g.t2, loser=g.t1.winner?g.t2:g.t1;
    if(!winner||!loser||!winner.matched||!loser.matched) return;
    var diff=winner.matched.seed-loser.matched.seed;
    if(diff<=0) return;
    if(diff>bupsetDiff||(diff===bupsetDiff&&winner.matched.seed>(bupset?bupset.winner.matched.seed:0))){
      bupsetDiff=diff; bupset={winner:winner,loser:loser,diff:diff};
    }
  });
  var bupsetHtml='<div class="pcard-tbd">Largest seed differential — any round</div>';
  if(bupset){ var bwt=bupset.winner.matched; bupsetHtml='<div class="pcard-leader">Current leader: <b style="color:#c4c4dc">'+(bwt?bwt.seed+' '+bwt.name:'?')+'</b> '+ownerTag(bwt.owner,8)+'<span style="color:#22c55e;font-weight:700"> — +'+bupset.diff+' seed diff</span></div>'; }

  /* Best 15/16 */
  var alive1516=TEAMS.filter(function(t){return (t.seed===15||t.seed===16)&&t.status!=='lost';});
  var best1516Html='';
  if(alive1516.length){
    best1516Html='<div class="pcard-leader">Still alive: '+alive1516.map(function(t){return '<b style="color:#22c55e">#'+t.seed+' '+t.name+'</b> '+ownerTag(t.owner,8);}).join(' · ')+'</div>';
  } else {
    var b1516=null,b1516m=Infinity;
    r64Done.forEach(function(g){
      var winner=g.t1.winner?g.t1:g.t2,loser=g.t1.winner?g.t2:g.t1;
      if(!loser||!loser.matched) return;
      if(loser.matched.seed!==15&&loser.matched.seed!==16) return;
      var m=winner?(winner.score-loser.score):999;
      if(m<b1516m||(m===b1516m&&loser.matched.seed>(b1516?b1516.loser.matched.seed:0))){b1516m=m;b1516={loser:loser,margin:m};}
    });
    if(b1516){var bt2=b1516.loser.matched;best1516Html='<div class="pcard-leader">Current leader: <b style="color:#c4c4dc">#'+bt2.seed+' '+bt2.name+'</b> '+ownerTag(bt2.owner,8)+'<span style="color:#c4c4dc;font-weight:700"> — lost by '+b1516.margin+' pts</span></div>';}
    else best1516Html='<div class="pcard-tbd">Loading…</div>';
  }

  html += '<div class="pcard-sec">Special Side Pots</div>'
    + '<div class="pcard"><div class="pcard-hdr"><div><div class="pcard-name">Biggest R1 Loss</div><div class="pcard-pct">4% of pot</div></div><div class="pcard-amt">$'+Math.round(POTS.loss)+'</div></div><div class="pcard-rule">Largest point-margin defeat in Round of 64. Tiebreaker: lowest points scored.</div>'+blossHtml+'</div>'
    + '<div class="pcard"><div class="pcard-hdr"><div><div class="pcard-name">Biggest Upset</div><div class="pcard-pct">4% of pot</div></div><div class="pcard-amt">$'+Math.round(POTS.upset)+'</div></div><div class="pcard-rule">Largest seed differential upset in the tournament. Tiebreaker: higher seed wins.</div>'+bupsetHtml+'</div>'
    + '<div class="pcard"><div class="pcard-hdr"><div><div class="pcard-name">Best #15 / #16 Seed</div><div class="pcard-pct">4% of pot</div></div><div class="pcard-amt">$'+Math.round(POTS.seed15)+'</div></div><div class="pcard-rule">Awarded to the 15 or 16 seed that goes furthest. Tiebreaker: margin of defeat.</div>'+best1516Html+'</div>';

  el.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════
   TAB SWITCHING
═══════════════════════════════════════════════════════ */

function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('panel-'+name).classList.add('on');
  btn.classList.add('on');
  document.getElementById('scroll-area').scrollTop = 0;
  renderAll();
}

/* ═══════════════════════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════════════════════ */

function renderAll() {
  var hasR32=[].concat(liveGames,upcomingGames,completedGames).some(function(g){return g.round==='R32';});
  var rt=document.getElementById('round-txt');
  if(rt) rt.textContent=(hasR32?'R32':'R64')+' · Live';
  renderTeams();
  renderGames();
  renderStandings();
  renderPayouts();
}

/* ── BOOT ─────────────────────────────────────────────── */
renderAll();
startPolling();
</script>
</body>
</html>
