<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeedMoney Live</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}

.card {
  background: #1e293b;
  padding: 14px;
  border-radius: 12px;
}

.team {
  font-size: 18px;
  font-weight: bold;
}

.score {
  font-size: 24px;
  margin: 6px 0;
}

.prob {
  font-size: 28px;
  font-weight: bold;
}

.live { color: #fbbf24; }
.up { color: #22c55e; }
.down { color: #ef4444; }

.small {
  font-size: 12px;
  color: #94a3b8;
}
</style>
</head>

<body>

<h1>SeedMoney Live Odds</h1>
<div class="grid" id="grid"></div>

<script>
/* =========================
   EDIT YOUR TEAMS HERE
========================= */
const TEAMS = [
  { name: "Duke Blue Devils", short: "Duke", pre: 0.94 },
  { name: "Michigan State Spartans", short: "Michigan St.", pre: 0.60 },
  { name: "VCU Rams", short: "VCU", pre: 0.43 },
  { name: "North Dakota State Bison", short: "NDSU", pre: 0.06 }
];

const API = "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard";

/* =========================
   MATH (LIVE PROBABILITY)
========================= */
function clamp(v){ return Math.max(0.001, Math.min(0.999, v)); }

function logit(p){ return Math.log(p/(1-p)); }
function invLogit(x){ return 1/(1+Math.exp(-x)); }

function calcProb(pre, diff, secondsLeft){
  const elapsed = 1 - (secondsLeft / 2400);

  const scoreWeight = 0.05 + (elapsed * 0.55);

  const base = logit(pre);
  const live = base + (diff * scoreWeight);

  return clamp(invLogit(live));
}

/* =========================
   UI SETUP
========================= */
const grid = document.getElementById("grid");

TEAMS.forEach((t,i)=>{
  grid.innerHTML += `
    <div class="card" id="card-${i}">
      <div class="team">${t.short}</div>
      <div class="score" id="score-${i}">--</div>
      <div class="prob" id="prob-${i}">${Math.round(t.pre*100)}%</div>
      <div class="small" id="status-${i}">Waiting</div>
    </div>
  `;
});

/* =========================
   HELPERS
========================= */
function secondsRemaining(period, clock){
  if(!clock) return 2400;
  const [m,s] = clock.split(":").map(Number);
  const sec = m*60 + s;

  if(period === 1) return 1200 + sec;
  if(period === 2) return sec;
  return sec;
}

function normalize(s){
  return s.toLowerCase().replace(/\./g,'').trim();
}

/* =========================
   MAIN UPDATE LOOP
========================= */
async function update(){
  const res = await fetch(API);
  const data = await res.json();

  const events = data.events;

  TEAMS.forEach((team,i)=>{
    let found = null;
    let isHome = false;

    for(const e of events){
      const c = e.competitions[0];
      const home = c.competitors.find(x=>x.homeAway==="home");
      const away = c.competitors.find(x=>x.homeAway==="away");

      if(normalize(home.team.displayName).includes(normalize(team.name))){
        found = e; isHome = true;
      }
      if(normalize(away.team.displayName).includes(normalize(team.name))){
        found = e; isHome = false;
      }
    }

    if(!found) return;

    const comp = found.competitions[0];
    const home = comp.competitors.find(x=>x.homeAway==="home");
    const away = comp.competitors.find(x=>x.homeAway==="away");

    const your = isHome ? home : away;
    const opp = isHome ? away : home;

    const status = found.status.type.name;
    const clock = found.status.displayClock;
    const period = found.status.period;

    const yourScore = parseInt(your.score);
    const oppScore = parseInt(opp.score);

    let prob = team.pre;

    if(status === "STATUS_IN_PROGRESS"){
      const secs = secondsRemaining(period, clock);
      prob = calcProb(team.pre, yourScore - oppScore, secs);
    }

    if(status === "STATUS_FINAL"){
      prob = yourScore > oppScore ? 1 : 0;
    }

    document.getElementById(`score-${i}`).innerText =
      (status === "STATUS_SCHEDULED")
      ? "vs " + opp.team.shortDisplayName
      : `${yourScore} - ${oppScore}`;

    document.getElementById(`prob-${i}`).innerText =
      Math.round(prob*100) + "%";

    document.getElementById(`status-${i}`).innerText =
      status === "STATUS_IN_PROGRESS"
      ? `LIVE ${period}H ${clock}`
      : status === "STATUS_FINAL"
      ? "FINAL"
      : "PRE";
  });
}

/* =========================
   RUN LOOP
========================= */
update();
setInterval(update, 20000);
</script>

</body>
</html>
